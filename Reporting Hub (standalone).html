document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ly: var(--font-mono); background: var(--bg); padding: 2px 6px; border-radius: 3px; font-weight: 500; letter-spacing: 0; }\n\n/* Command palette */\n.cmd-overlay { position: fixed; inset: 0; background: rgba(11,18,32,0.55); display: none; align-items: flex-start; justify-content: center; z-index: 200; padding-top: 12vh; backdrop-filter: blur(3px); }\n.cmd-overlay.open { display: flex; }\n.cmd-modal { background: var(--surface); border-radius: var(--radius-lg); width: 580px; max-width: 90vw; max-height: 70vh; box-shadow: var(--shadow-lg); overflow: hidden; display: flex; flex-direction: column; }\n.cmd-input-wrap { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }\n.cmd-input { flex: 1; border: none; outline: none; font-size: 15px; background: transparent; color: var(--text); }\n.cmd-results { overflow-y: auto; max-height: 50vh; padding: 6px; }\n.cmd-section { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 10px 4px; font-weight: 600; }\n.cmd-item { padding: 8px 10px; font-size: 13px; cursor: pointer; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 10px; }\n.cmd-item:hover, .cmd-item.cmd-active { background: var(--primary-softer); }\n.cmd-item-icon { font-size: 14px; width: 22px; display: flex; justify-content: center; }\n.cmd-item-text { flex: 1; }\n.cmd-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; font-family: var(--font-mono); }\n.cmd-item-kbd { font-family: var(--font-mono); font-size: 10px; background: var(--bg); padding: 2px 5px; border-radius: 3px; color: var(--text-muted); }\n\n/* Drawer (alerts) */\n.drawer-overlay { position: fixed; inset: 0; background: rgba(11,18,32,0.45); display: none; z-index: 150; }\n.drawer-overlay.open { display: block; animation: overlayIn 0.25s ease; }\n.drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 380px; background: var(--surface); border-left: 1p    <div class=\"dropdown-item\" onclick=\"exportJSON()\">💾 Backup JSON completo<\u002Fdiv>\n            <div class=\"dropdown-item\" onclick=\"exportCSV('projects')\">📊 CSV de projetos (Notion)<\u002Fdiv>\n            <div class=\"dropdown-item\" onclick=\"exportCSV('tasks')\">📊 CSV de tarefas (Notion)<\u002Fdiv>\n            <div class=\"dropdown-item\" onclick=\"exportCSV('goals')\">📊 CSV de metas<\u002Fdiv>\n            <div class=\"dropdown-divider\"><\u002Fdiv>\n            <div class=\"dropdown-item\" onclick=\"document.getElementById('import-input').click()\">📥 Importar JSON<\u002Fdiv>\n            <input type=\"file\" id=\"import-input\" accept=\".json\" style=\"display:none\" onchange=\"importJSON(event)\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"icon-btn\" data-label=\"Seleção\" onclick=\"toggleBulkMode()\" id=\"bulk-btn\" title=\"Seleção múltipla\">☑<\u002Fbutton>\n        <button class=\"icon-btn\" data-label=\"Tema\" onclick=\"toggleTheme()\" title=\"Tema\" id=\"theme-btn\">🌓<\u002Fbutton>\n        <button class=\"icon-btn\" data-label=\"Config\" onclick=\"openSettings()\" title=\"Configurações\">⚙<\u002Fbutton>\n        <button class=\"btn-primary\" onclick=\"openTaskModal()\">+ Nova tarefa<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <div class=\"content\" id=\"content\"><\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- ==================== MODALS ==================== -->\n<div class=\"modal-overlay\" id=\"task-modal\">\n  <div class=\"modal wide\">\n    <div class=\"modal-header\">\n      <div class=\"modal-title\" id=\"task-modal-title\">Nova tarefa<\u002Fdiv>\n      <button class=\"modal-close\" onclick=\"closeTaskModal()\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"form-group\">\n        <label class=\"form-label\">Título<\u002Flabel>\n        <input type=\"text\" class=\"form-input\" id=\"task-title\" placeholder=\"Ex.: Validar fechamento IFRS de outubro\">\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <div class=\"form-group\"><label class=\"form-label\">Projeto<\u002Flabel><select class=\"form-select\" id=\"task-project\"><\u002Fselect><\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Tags <span class=\"form-help\">(Enter para adicionar)<\u002Fspan><\u002Flabel>\n          <div class=\"tag-input-wrap\" id=\"task-tags-wrap\"><input type=\"text\" id=\"task-tags-input\" placeholder=\"ex: urgente, ifrs\" onkeydown=\"handleTagInput(event)\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row-3\">\n        <div class=\"form-group\"><label class=\"form-label\">Data<\u002Flabel><input type=\"date\" class=\"form-input\" id=\"task-date\"><\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Prioridade<\u002Flabel>\n          <select class=\"form-select\" id=\"task-priority\">\n            <option value=\"p1\">P1 · Crítica<\u002Foption>\n            <option value=\"p2\" selected=\"\">P2 · Importante<\u002Foption>\n            <option value=\"p3\">P3 · Normal<\u002Foption>\n            <option value=\"p4\">P4 · Baixa<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Importância<\u002Flabel>\n          <select class=\"form-select\" id=\"task-importance\">\n            <option value=\"high\">Alta<\u002Foption>\n            <option value=\"med\" selected=\"\">Média<\u002Foption>\n            <option value=\"low\">Baixa<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row-3\">\n        <div class=\"form-group\"><label class=\"form-label\">Status<\u002Flabel>\n          <select class=\"form-select\" id=\"task-status\">\n            <option value=\"todo\">A fazer<\u002Foption>\n            <option value=\"doing\">Em andamento<\u002Foption>\n            <option value=\"blocked\">Bloqueada<\u002Foption>\n            <option value=\"done\">Concluída<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Estimado (h)<\u002Flabel><input type=\"number\" class=\"form-input\" id=\"task-hours\" placeholder=\"2\" step=\"0.5\" min=\"0\"><\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Recorrência<\u002Flabel>\n          <select class=\"form-select\" id=\"task-recurrence\">\n            <option value=\"\">Sem recorrência<\u002Foption>\n            <option value=\"daily\">Diária<\u002Foption>\n            <option value=\"weekly\">Semanal<\u002Foption>\n            <option value=\"biweekly\">Quinzenal<\u002Foption>\n            <option value=\"monthly\">Mensal<\u002Foption>\n            <option value=\"monthly-business\">Último dia útil do mês<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-group\">\n        <label class=\"form-label\">Checklist <span class=\"form-help\" id=\"subtask-progress\"><\u002Fspan><\u002Flabel>\n        <div class=\"subtask-list\" id=\"subtask-list\"><\u002Fdiv>\n        <div class=\"subtask-add\"><input type=\"text\" id=\"subtask-input\" placeholder=\"+ Adicionar subitem · Enter\" onkeydown=\"if(event.key==='Enter') addSubtask()\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-group\">\n        <label class=\"form-label\">Notas <span class=\"form-help\">(suporta markdown simples)<\u002Fspan><\u002Flabel>\n        <textarea class=\"form-textarea\" id=\"task-notes\" placeholder=\"Contexto, links, dependências...\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <div class=\"form-group\" id=\"time-log-group\" style=\"display:none;\">\n        <label class=\"form-label\">Tempo registrado<\u002Flabel>\n        <div id=\"time-log-display\" style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-footer\">\n      <span class=\"modal-footer-left\" id=\"task-footer-info\"><\u002Fspan>\n      <button class=\"btn-danger\" id=\"task-delete-btn\" onclick=\"deleteCurrentTask()\" style=\"display:none;\">Excluir<\u002Fbutton>\n      <button class=\"btn-secondary\" onclick=\"closeTaskModal()\">Cancelar<\u002Fbutton>\n      <button class=\"btn-primary\" onclick=\"saveTask()\">Salvar<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"modal-overlay\" id=\"project-modal\">\n  <div class=\"modal\">\n    <div class=\"modal-header\">\n      <div class=\"modal-title\" id=\"project-modal-title\">Novo projeto<\u002Fdiv>\n      <button class=\"modal-close\" onclick=\"closeProjectModal()\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"form-group\"><label class=\"form-label\">Nome do projeto<\u002Flabel><input type=\"text\" class=\"form-input\" id=\"project-name\" placeholder=\"Ex.: Validador IFRS 16\"><\u002Fdiv>\n      <div class=\"form-row\">\n        <div class=\"form-group\"><label class=\"form-label\">Área<\u002Flabel>\n          <select class=\"form-select\" id=\"project-area\">\n            <option value=\"compliance\">Compliance<\u002Foption><option value=\"reporting\">Reporting<\u002Foption><option value=\"ifrs\">IFRS<\u002Foption>\n            <option value=\"tooling\">Tooling interno<\u002Foption><option value=\"cross\">Cross-funcional<\u002Foption><option value=\"other\">Outro<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Status<\u002Flabel>\n          <select class=\"form-select\" id=\"project-status\">\n            <option value=\"on-track\">No prazo<\u002Foption><option value=\"at-risk\">Em risco<\u002Foption>\n            <option value=\"blocked\">Bloqueado<\u002Foption><option value=\"done\">Concluído<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <div class=\"form-group\"><label class=\"form-label\">Prazo<\u002Flabel><input type=\"date\" class=\"form-input\" id=\"project-deadline\"><\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Cor<\u002Flabel>\n          <select class=\"form-select\" id=\"project-color\">\n            <option value=\"#002CBE\">Azul Asaas<\u002Foption><option value=\"#0038E5\">Azul vibrante<\u002Foption><option value=\"#00875F\">Verde<\u002Foption>\n            <option value=\"#C97500\">Âmbar<\u002Foption><option value=\"#C92424\">Vermelho<\u002Foption><option value=\"#7C3AED\">Roxo<\u002Foption>\n            <option value=\"#0E6BB4\">Azul claro<\u002Foption><option value=\"#0F766E\">Teal<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-group\"><label class=\"form-label\">ID Jira (opcional)<\u002Flabel><input type=\"text\" class=\"form-input\" id=\"project-jira\" placeholder=\"Ex.: REP-142\"><\u002Fdiv>\n      <div class=\"form-group\"><label class=\"form-label\">Descrição<\u002Flabel><textarea class=\"form-textarea\" id=\"project-description\" placeholder=\"Objetivo, escopo, dependências...\"><\u002Ftextarea><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"btn-danger\" id=\"project-delete-btn\" onclick=\"deleteCurrentProject()\" style=\"display:none;\">Excluir<\u002Fbutton>\n      <button class=\"btn-secondary\" onclick=\"closeProjectModal()\">Cancelar<\u002Fbutton>\n      <button class=\"btn-primary\" onclick=\"saveProject()\">Salvar<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"modal-overlay\" id=\"goal-modal\">\n  <div class=\"modal\">\n    <div class=\"modal-header\">\n      <div class=\"modal-title\" id=\"goal-modal-title\">Nova meta<\u002Fdiv>\n      <button class=\"modal-close\" onclick=\"closeGoalModal()\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"form-group\"><label class=\"form-label\">Título da meta<\u002Flabel><input type=\"text\" class=\"form-input\" id=\"goal-title\" placeholder=\"Ex.: Fechar 100% das tarefas P1 da semana\"><\u002Fdiv>\n      <div class=\"form-row-3\">\n        <div class=\"form-group\"><label class=\"form-label\">Tipo<\u002Flabel>\n          <select class=\"form-select\" id=\"goal-type\">\n            <option value=\"numeric\">Numérica (atinge X)<\u002Foption>\n            <option value=\"task-count\">Contagem de tarefas concluídas<\u002Foption>\n            <option value=\"hours\">Horas trabalhadas<\u002Foption>\n            <option value=\"percent\">Percentual<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Meta (alvo)<\u002Flabel><input type=\"number\" class=\"form-input\" id=\"goal-target\" placeholder=\"100\" step=\"0.1\"><\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Unidade<\u002Flabel><input type=\"text\" class=\"form-input\" id=\"goal-unit\" placeholder=\"ex: %, h, tarefas\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <div class=\"form-group\"><label class=\"form-label\">Período<\u002Flabel>\n          <select class=\"form-select\" id=\"goal-period\">\n            <option value=\"week\">Semana<\u002Foption><option value=\"month\" selected=\"\">Mês<\u002Foption><option value=\"quarter\">Trimestre<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Projeto (opcional)<\u002Flabel><select class=\"form-select\" id=\"goal-project\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-group\"><label class=\"form-label\">Valor atual<\u002Flabel><input type=\"number\" class=\"form-input\" id=\"goal-current\" placeholder=\"0\" step=\"0.1\"><\u002Fdiv>\n      <div class=\"form-group\"><label class=\"form-label\">Notas<\u002Flabel><textarea class=\"form-textarea\" id=\"goal-notes\" placeholder=\"Como vai medir? Quais marcos?\"><\u002Ftextarea><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"btn-danger\" id=\"goal-delete-btn\" onclick=\"deleteCurrentGoal()\" style=\"display:none;\">Excluir<\u002Fbutton>\n      <button class=\"btn-secondary\" onclick=\"closeGoalModal()\">Cancelar<\u002Fbutton>\n      <button class=\"btn-primary\" onclick=\"saveGoal()\">Salvar<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"modal-overlay\" id=\"settings-modal\">\n  <div class=\"modal wide\">\n    <div class=\"modal-header\">\n      <div class=\"modal-title\">Configurações<\u002Fdiv>\n      <button class=\"modal-close\" onclick=\"closeSettings()\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"section-header\"><div class=\"section-title\">⚡ Pomodoro<\u002Fdiv><\u002Fdiv>\n      <div class=\"form-row-3\">\n        <div class=\"form-group\"><label class=\"form-label\">Foco (min)<\u002Flabel><input type=\"number\" class=\"form-input\" id=\"set-pomo-focus\" min=\"5\" max=\"90\" step=\"1\"><\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Pausa curta (min)<\u002Flabel><input type=\"number\" class=\"form-input\" id=\"set-pomo-break\" min=\"1\" max=\"30\" step=\"1\"><\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Pausa longa (min)<\u002Flabel><input type=\"number\" class=\"form-input\" id=\"set-pomo-long\" min=\"5\" max=\"60\" step=\"1\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"section-header\"><div class=\"section-title\">🔔 Notificações<\u002Fdiv><\u002Fdiv>\n      <div class=\"form-row\">\n        <div class=\"form-group\">\n          <label class=\"form-label\"><input type=\"checkbox\" id=\"set-notify-overdue\"> Avisar sobre tarefas atrasadas<\u002Flabel>\n          <label class=\"form-label\"><input type=\"checkbox\" id=\"set-notify-duetoday\"> Avisar sobre tarefas vencendo hoje<\u002Flabel>\n          <label class=\"form-label\"><input type=\"checkbox\" id=\"set-notify-projectrisk\"> Alertar projetos em risco<\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"form-group\">\n          <label class=\"form-label\"><input type=\"checkbox\" id=\"set-browser-notif\"> Notificações do navegador<\u002Flabel>\n          <button class=\"btn-secondary\" onclick=\"requestNotifPermission()\" style=\"margin-top: 6px; align-self: flex-start;\">Solicitar permissão<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"section-header\"><div class=\"section-title\">🔗 Integrações<\u002Fdiv><\u002Fdiv>\n      <div class=\"form-group\">\n        <label class=\"form-label\">Webhook Slack <span class=\"form-help\">(crie em api.slack.com → Incoming Webhooks)<\u002Fspan><\u002Flabel>\n        <input type=\"text\" class=\"form-input\" id=\"set-slack-webhook\" placeholder=\"https://hooks.slack.com/services/...\">\n      <\u002Fdiv>\n      <div class=\"form-group\">\n        <label class=\"form-label\">Webhook n8n / genérico <span class=\"form-help\">(POST JSON)<\u002Fspan><\u002Flabel>\n        <input type=\"text\" class=\"form-input\" id=\"set-n8n-webhook\" placeholder=\"https://cash.n8n.platform.asaas.com/webhook/...\">\n      <\u002Fdiv>\n\n      <div class=\"section-header\"><div class=\"section-title\">📅 Preferências de visualização<\u002Fdiv><\u002Fdiv>\n      <div class=\"form-row\">\n        <div class=\"form-group\"><label class=\"form-label\">Início do expediente<\u002Flabel><input type=\"time\" class=\"form-input\" id=\"set-work-start\"><\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Fim do expediente<\u002Flabel><input type=\"time\" class=\"form-input\" id=\"set-work-end\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <div class=\"form-group\"><label class=\"form-label\">Limite recomendado de tarefas/dia<\u002Flabel><input type=\"number\" class=\"form-input\" id=\"set-daily-limit\" min=\"1\" max=\"20\"><\u002Fdiv>\n        <div class=\"form-group\"><label class=\"form-label\">Limite recomendado de horas/dia<\u002Flabel><input type=\"number\" class=\"form-input\" id=\"set-daily-hours\" min=\"1\" max=\"16\" step=\"0.5\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"section-header\"><div class=\"section-title\">🗑 Zona de risco<\u002Fdiv><\u002Fdiv>\n      <div style=\"display: flex; gap: 8px; flex-wrap: wrap;\">\n        <button class=\"btn-secondary\" onclick=\"resetCompletedOlder()\">Limpar concluídas &gt; 90d<\u002Fbutton>\n        <button class=\"btn-danger\" onclick=\"resetAllData()\">Apagar todos os dados<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"btn-secondary\" onclick=\"closeSettings()\">Fechar<\u002Fbutton>\n      <button class=\"btn-primary\" onclick=\"saveSettings()\">Salvar configurações<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Command palette -->\n<div class=\"cmd-overlay\" id=\"cmd-overlay\" onclick=\"if(event.target.id==='cmd-overlay') closeCmdPalette()\">\n  <div class=\"cmd-modal\">\n    <div class=\"cmd-input-wrap\">\n      <span style=\"font-size: 16px; color: var(--text-faint);\">⌕<\u002Fspan>\n      <input type=\"text\" class=\"cmd-input\" id=\"cmd-input\" placeholder=\"Buscar tarefas, projetos, ou digite &gt; para comandos...\" oninput=\"renderCmdResults()\" onkeydown=\"handleCmdKeydown(event)\">\n      <span class=\"cmd-item-kbd\">esc<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cmd-results\" id=\"cmd-results\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Alerts drawer -->\n<div class=\"drawer-overlay\" id=\"drawer-overlay\" onclick=\"closeAlerts()\"><\u002Fdiv>\n<div class=\"drawer\" id=\"alerts-drawer\">\n  <div class=\"drawer-header\">\n    <div class=\"drawer-title\">🔔 Alertas e avisos<\u002Fdiv>\n    <button class=\"modal-close\" onclick=\"closeAlerts()\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"drawer-body\" id=\"alerts-body\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Pomodoro widget -->\n<div class=\"pomo-widget\" id=\"pomo-widget\">\n  <div class=\"pomo-header\">\n    <div class=\"pomo-mode-label\" id=\"pomo-mode-label\">FOCO<\u002Fdiv>\n    <button class=\"modal-close\" onclick=\"closePomodoro()\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"pomo-task\" id=\"pomo-task-display\">Sem tarefa vinculada<\u002Fdiv>\n  <div class=\"pomo-time\" id=\"pomo-time\">25:00<\u002Fdiv>\n  <div class=\"pomo-controls\">\n    <button id=\"pomo-start-btn\" onclick=\"togglePomodoro()\" class=\"primary\">Iniciar<\u002Fbutton>\n    <button onclick=\"resetPomodoro()\">Reset<\u002Fbutton>\n    <button onclick=\"skipPomodoro()\">Skip<\u002Fbutton>\n  <\u002Fdiv>\n  <div style=\"font-size: 11px; color: var(--text-muted); margin-top: 10px; text-align: center;\" id=\"pomo-stats\">Sessões hoje: 0<\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"toast\" id=\"toast\"><\u002Fdiv>\n\n<script>\n// ============================================================\n// EMPTY-STATE ILLUSTRATIONS (defined before boot render)\n// ============================================================\nfunction svgEmpty(kind) {\n  const open = '<svg class=\"empty-art\" viewBox=\"0 0 104 78\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">';\n  const arts = {\n    focus: `\n      <rect x=\"25\" y=\"13\" width=\"48\" height=\"57\" rx=\"6\" stroke=\"currentColor\" stroke-width=\"2.5\"/>\n      <rect x=\"38\" y=\"7\" width=\"22\" height=\"12\" rx=\"3\" fill=\"var(--surface)\" stroke=\"currentColor\" stroke-width=\"2.5\"/>\n      <path d=\"M34 33h22M34 45h28M34 57h15\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n      <circle class=\"accent\" cx=\"76\" cy=\"55\" r=\"15\" fill=\"var(--surface)\" stroke=\"currentColor\" stroke-width=\"2.5\"/>\n      <path class=\"accent\" d=\"M69 55l4.5 4.5L83 49\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>`,\n    goal: `\n      <path d=\"M35 8v62\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n      <circle cx=\"35\" cy=\"8\" r=\"3.5\" fill=\"currentColor\"/>\n      <path class=\"accent\" d=\"M35 14h35l-8 9.5 8 9.5H35z\" fill=\"currentColor\"/>\n      <path d=\"M21 70h45\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>`,\n    clear: `\n      <circle class=\"accent\" cx=\"52\" cy=\"40\" r=\"22\" stroke=\"currentColor\" stroke-width=\"2.5\"/>\n      <path class=\"accent\" d=\"M42 40l7 7 15-16\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n      <path d=\"M87 15l2 5.5 5.5 2-5.5 2L87 30l-2-5.5-5.5-2 5.5-2z\" fill=\"currentColor\"/>\n      <path d=\"M17 53l1.6 4.2 4.2 1.6-4.2 1.6L17 64.6l-1.6-4.2-4.2-1.6 4.2-1.6z\" fill=\"currentColor\"/>`\n  };\n  return open + (arts[kind] || arts.clear) + '<\u002Fsvg>';\n}\n\n// ============================================================\n// STATE & STORAGE\n// ============================================================\nconst STORAGE_KEY = 'asaas_reporting_hub_v2';\n\nconst defaultSettings = {\n  theme: 'light',\n  pomoFocus: 25,\n  pomoBreak: 5,\n  pomoLong: 15,\n  notifyOverdue: true,\n  notifyDueToday: true,\n  notifyProjectRisk: true,\n  browserNotif: false,\n  slackWebhook: '',\n  n8nWebhook: '',\n  workStart: '09:00',\n  workEnd: '18:00',\n  dailyLimit: 7,\n  dailyHours: 6,\n  monthOffset: 0\n};\n\nconst defaultState = {\n  projects: [\n    { id: 'p_rep', name: 'Workflow paralelo no REP', area: 'tooling', status: 'on-track', deadline: '', color: '#002CBE', jira: 'REP', description: 'Configuração de workflow multi-aprovador no Jira (REP)' },\n    { id: 'p_ifrs', name: 'Validador IFRS', area: 'ifrs', status: 'on-track', deadline: '', color: '#00875F', jira: '', description: 'Dashboard de validação de demonstrativos IFRS' },\n    { id: 'p_close', name: 'Fechamento mensal', area: 'reporting', status: 'on-track', deadline: '', color: '#C97500', jira: '', description: 'Rotina recorrente de fechamento' }\n  ],\n  tasks: [],\n  tags: [],\n  goals: [],\n  weeklyReviews: {},\n  pomodoroSessions: [],\n  activity: [],\n  selectedProject: null,\n  selectedTag: null,\n  currentView: 'day',\n  editingTaskId: null,\n  editingProjectId: null,\n  editingGoalId: null,\n  draftSubtasks: [],\n  draftTags: [],\n  bulkMode: false,\n  bulkSelection: new Set(),\n  allTasksFilters: {\n    search: '', project: '', status: '', priority: '', tag: '',\n    recurrence: '', dateFrom: '', dateTo: '', showCompleted: true\n  },\n  allTasksSort: { col: 'date', dir: 'asc' },\n  settings: { ...defaultSettings }\n};\n\nlet state = loadState();\nfunction loadState() {\n  try {\n    const stored = localStorage.getItem(STORAGE_KEY);\n    if (stored) {\n      const parsed = JSON.parse(stored);\n      const merged = {\n        ...defaultState,\n        ...parsed,\n        settings: { ...defaultSettings, ...(parsed.settings || {}) },\n        allTasksFilters: { ...defaultState.allTasksFilters, ...(parsed.allTasksFilters || {}) },\n        allTasksSort: { ...defaultState.allTasksSort, ...(parsed.allTasksSort || {}) },\n        bulkSelection: new Set()\n      };\n      return merged;\n    }\n  } catch (e) { console.error('Load error', e); }\n  return JSON.parse(JSON.stringify({ ...defaultState, bulkSelection: undefined }));\n}\nfunction saveState() {\n  const toSave = {\n    projects: state.projects,\n    tasks: state.tasks,\n    tags: state.tags,\n    goals: state.goals,\n    weeklyReviews: state.weeklyReviews,\n    pomodoroSessions: state.pomodoroSessions,\n    activity: state.activity.slice(-500),\n    settings: state.settings,\n    allTasksFilters: state.allTasksFilters,\n    allTasksSort: state.allTasksSort\n  };\n  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));\n}\n\n// ============================================================\n// UTILITIES\n// ============================================================\nfunction uid(prefix) { return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }\nfunction todayISO() { return new Date().toISOString().slice(0, 10); }\nfunction fmtDateBR(iso) { if (!iso) return ''; const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; }\nfunction fmtDateShort(iso) { if (!iso) return ''; const [y,m,d] = iso.split('-'); return `${d}/${m}`; }\nfunction isoFromDate(d) {\n  const yyyy = d.getFullYear();\n  const mm = String(d.getMonth() + 1).padStart(2, '0');\n  const dd = String(d.getDate()).padStart(2, '0');\n  return `${yyyy}-${mm}-${dd}`;\n}\nfunction startOfWeek(date) {\n  const d = new Date(date);\n  d.setHours(0,0,0,0);\n  const day = d.getDay();\n  const diff = d.getDate() - day + (day === 0 ? -6 : 1);\n  return new Date(d.setDate(diff));\n}\nfunction getWeekISO(date) {\n  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));\n  const dayNum = d.getUTCDay() || 7;\n  d.setUTCDate(d.getUTCDate() + 4 - dayNum);\n  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));\n  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);\n  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;\n}\nfunction getMonthKey(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`; }\nfunction daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }\nfunction priorityOrder(p) { return { p1: 0, p2: 1, p3: 2, p4: 3 }[p] ?? 99; }\nfunction priorityLabel(p) { return { p1: 'Crítica', p2: 'Importante', p3: 'Normal', p4: 'Baixa' }[p] || p; }\nfunction escapeHtml(str) { if (str == null) return ''; return String(str).replace(/[&<>\"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;' }[c])); }\nfunction escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }\nfunction nl2br(s) { return escapeHtml(s).replace(/\\n/g, '<br>'); }\n\nfunction toast(msg, type) {\n  const t = document.getElementById('toast');\n  t.textContent = msg;\n  t.className = 'toast show' + (type ? ' ' + type : '');\n  clearTimeout(window._toastT);\n  window._toastT = setTimeout(() => t.classList.remove('show'), 2800);\n}\n\nfunction logActivity(entity, entityId, action, detail) {\n  state.activity.push({\n    at: new Date().toISOString(),\n    entity, entityId, action, detail: detail || ''\n  });\n}\n\nfunction isLastBusinessDayOfMonth(date) {\n  const d = new Date(date);\n  const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0);\n  while ([0, 6].includes(lastDay.getDay())) lastDay.setDate(lastDay.getDate() - 1);\n  return d.getDate() === lastDay.getDate() && d.getMonth() === lastDay.getMonth();\n}\n\n// ============================================================\n// RECURRING TASKS\n// ============================================================\nfunction nextRecurrenceDate(task) {\n  if (!task.date || !task.recurrence) return null;\n  const d = new Date(task.date + 'T00:00:00');\n  switch (task.recurrence) {\n    case 'daily': d.setDate(d.getDate() + 1); break;\n    case 'weekly': d.setDate(d.getDate() + 7); break;\n    case 'biweekly': d.setDate(d.getDate() + 14); break;\n    case 'monthly': d.setMonth(d.getMonth() + 1); break;\n    case 'monthly-business': {\n      d.setMonth(d.getMonth() + 1);\n      const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);\n      while ([0, 6].includes(last.getDay())) last.setDate(last.getDate() - 1);\n      return isoFromDate(last);\n    }\n    default: return null;\n  }\n  return isoFromDate(d);\n}\n\nfunction spawnRecurringTask(task) {\n  const nextDate = nextRecurrenceDate(task);\n  if (!nextDate) return;\n  const exists = state.tasks.some(t => t.recurringParentId === (task.recurringParentId || task.id) && t.date === nextDate);\n  if (exists) return;\n  const clone = {\n    ...task,\n    id: uid('t'),\n    date: nextDate,\n    status: 'todo',\n    completedAt: null,\n    subtasks: (task.subtasks || []).map(s => ({ id: uid('s'), title: s.title, done: false })),\n    timeLogs: [],\n    recurringParentId: task.recurringParentId || task.id,\n    createdAt: new Date().toISOString()\n  };\n  delete clone.completedAt;\n  state.tasks.push(clone);\n}\n\n// ============================================================\n// ALERTS COMPUTATION\n// ============================================================\nfunction computeAlerts() {\n  const alerts = [];\n  const today = todayISO();\n  const now = new Date();\n\n  if (state.settings.notifyOverdue) {\n    state.tasks.forEach(t => {\n      if (t.status === 'done' || !t.date) return;\n      if (t.date < today) {\n        const days = daysBetween(t.date, today);\n        alerts.push({ id: 'over_' + t.id, type: 'danger', title: t.title, sub: `Atrasada há ${days} dia${days !== 1 ? 's' : ''}`, taskId: t.id });\n      }\n    });\n  }\n  if (state.settings.notifyDueToday) {\n    state.tasks.forEach(t => {\n      if (t.status === 'done' || t.date !== today) return;\n      alerts.push({ id: 'due_' + t.id, type: 'warning', title: t.title, sub: 'Vence hoje', taskId: t.id });\n    });\n  }\n  state.tasks.forEach(t => {\n    if (t.status === 'blocked') alerts.push({ id: 'blk_' + t.id, type: 'danger', title: t.title, sub: '🚧 Bloqueada — requer ação', taskId: t.id });\n  });\n  if (state.settings.notifyProjectRisk) {\n    state.projects.forEach(p => {\n      if (p.status === 'at-risk' || p.status === 'blocked') {\n        alerts.push({ id: 'pjr_' + p.id, type: 'warning', title: p.name, sub: `Projeto ${p.status === 'at-risk' ? 'em risco' : 'bloqueado'}`, projectId: p.id });\n      }\n      if (p.deadline && p.status !== 'done') {\n        const days = daysBetween(today, p.deadline);\n        if (days >= 0 && days <= 3) {\n          alerts.push({ id: 'pjd_' + p.id, type: 'warning', title: p.name, sub: `Prazo em ${days} dia${days !== 1 ? 's' : ''}`, projectId: p.id });\n        } else if (days < 0) {\n          alerts.push({ id: 'pjo_' + p.id, type: 'danger', title: p.name, sub: `Prazo vencido há ${Math.abs(days)} dia${Math.abs(days) !== 1 ? 's' : ''}`, projectId: p.id });\n        }\n      }\n    });\n  }\n  state.goals.forEach(g => {\n    if (g.period === 'month' && g.monthKey === getMonthKey(now)) {\n      const pct = g.target > 0 ? (g.current / g.target) * 100 : 0;\n      const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();\n      const dayOfMonth = now.getDate();\n      const expectedPct = (dayOfMonth / daysInMonth) * 100;\n      if (pct < expectedPct - 25) {\n        alerts.push({ id: 'goal_' + g.id, type: 'warning', title: g.title, sub: `Meta abaixo do esperado (${Math.round(pct)}% vs ${Math.round(expectedPct)}%)`, goalId: g.id });\n      }\n    }\n  });\n  return alerts;\n}\n\n// ============================================================\n// FILTERING\n// ============================================================\nfunction getFilteredTasks() {\n  return state.tasks.filter(t => {\n    if (state.selectedProject && t.project !== state.selectedProject) return false;\n    if (state.selectedTag && !(t.tags || []).includes(state.selectedTag)) return false;\n    return true;\n  });\n}\n\nfunction tasksForView(view) {\n  const now = new Date();\n  const today = todayISO();\n  return getFilteredTasks().filter(t => {\n    if (!t.date) return view === 'day' && (t.status === 'todo' || t.status === 'doing' || t.status === 'blocked');\n    const td = new Date(t.date + 'T00:00:00');\n    if (view === 'day') {\n      if (t.date === today) return true;\n      if (t.date < today && t.status !== 'done') return true;\n      return false;\n    }\n    if (view === 'week') { const start = startOfWeek(now); const end = new Date(start); end.setDate(start.getDate() + 6); return td >= start && td <= end; }\n    if (view === 'month') {\n      const offset = state.settings.monthOffset || 0;\n      const refMonth = new Date(now.getFullYear(), now.getMonth() + offset, 1);\n      return td.getMonth() === refMonth.getMonth() && td.getFullYear() === refMonth.getFullYear();\n    }\n    return true;\n  });\n}\n\n// ============================================================\n// MAIN RENDER DISPATCHER\n// ============================================================\nfunction render() {\n  applyTheme();\n  renderSidebar();\n  renderTopbar();\n  renderContent();\n  renderFooterStats();\n  renderAlertBadge();\n  document.body.classList.toggle('bulk-mode', state.bulkMode);\n}\n\nfunction applyTheme() {\n  document.documentElement.setAttribute('data-theme', state.settings.theme || 'light');\n}\n\nfunction renderSidebar() {\n  // Projects\n  const list = document.getElementById('projects-list');\n  list.innerHTML = '';\n  state.projects.forEach(p => {\n    const count = state.tasks.filter(t => t.project === p.id && t.status !== 'done').length;\n    const row = document.createElement('div');\n    row.className = 'project-row' + (state.selectedProject === p.id ? ' active' : '');\n    row.innerHTML = `<span class=\"project-dot\" style=\"background:${p.color}\"><\u002Fspan><span class=\"project-name\">${escapeHtml(p.name)}<\u002Fspan><span class=\"project-count\">${count}<\u002Fspan>`;\n    row.onclick = () => { state.selectedProject = state.selectedProject === p.id ? null : p.id; render(); };\n    row.ondblclick = (e) => { e.stopPropagation(); openProjectModal(p.id); };\n    list.appendChild(row);\n  });\n\n  // Tags (computed from tasks)\n  const tagsList = document.getElementById('tags-list');\n  tagsList.innerHTML = '';\n  const tagCounts = {};\n  state.tasks.forEach(t => (t.tags || []).forEach(tg => {\n    if (t.status !== 'done') tagCounts[tg] = (tagCounts[tg] || 0) + 1;\n  }));\n  const tagNames = Object.keys(tagCounts).sort();\n  if (tagNames.length === 0) {\n    tagsList.innerHTML = '<div style=\"font-size: 11px; color: var(--text-faint); padding: 4px 10px;\">Adicione tags às tarefas<\u002Fdiv>';\n  } else {\n    tagNames.slice(0, 12).forEach(tg => {\n      const row = document.createElement('div');\n      row.className = 'tag-row' + (state.selectedTag === tg ? ' active' : '');\n      row.innerHTML = `<span class=\"tag-hash\">#<\u002Fspan><span class=\"tag-name\">${escapeHtml(tg)}<\u002Fspan><span class=\"tag-count\">${tagCounts[tg]}<\u002Fspan>`;\n      row.onclick = () => { state.selectedTag = state.selectedTag === tg ? null : tg; render(); };\n      tagsList.appendChild(row);\n    });\n  }\n\n  // Counts\n  document.getElementById('count-all').textContent = state.tasks.filter(t => t.status !== 'done').length;\n  document.getElementById('count-today').textContent = tasksForView('day').filter(t => t.status !== 'done').length;\n  document.getElementById('count-week').textContent = tasksForView('week').filter(t => t.status !== 'done').length;\n  document.getElementById('count-month').textContent = tasksForView('month').filter(t => t.status !== 'done').length;\n  document.querySelectorAll('.nav-item[data-view]').forEach(el => { el.classList.toggle('active', el.dataset.view === state.currentView); });\n}\n\nfunction renderFooterStats() {\n  const active = state.tasks.filter(t => t.status !== 'done').length;\n  const sevenAgo = new Date(); sevenAgo.setDate(sevenAgo.getDate() - 7);\n  const done7 = state.tasks.filter(t => t.status === 'done' && t.completedAt && new Date(t.completedAt) >= sevenAgo).length;\n\n  // Velocity (avg/week last 4 weeks)\n  const fourWeeksAgo = new Date(); fourWeeksAgo.setDate(fourWeeksAgo.getDate() - 28);\n  const done28 = state.tasks.filter(t => t.status === 'done' && t.completedAt && new Date(t.completedAt) >= fourWeeksAgo).length;\n  const velocity = (done28 / 4).toFixed(1);\n\n  // Streak: consecutive days with at least 1 completion\n  let streak = 0;\n  const checkDate = new Date();\n  while (true) {\n    const iso = isoFromDate(checkDate);\n    const hasCompletion = state.tasks.some(t => t.completedAt && t.completedAt.slice(0,10) === iso);\n    if (hasCompletion) { streak++; checkDate.setDate(checkDate.getDate() - 1); }\n    else { if (streak === 0 && iso === todayISO()) { checkDate.setDate(checkDate.getDate() - 1); continue; } break; }\n    if (streak > 365) break;\n  }\n\n  document.getElementById('footer-active').textContent = active;\n  document.getElementById('footer-done7').textContent = done7;\n  document.getElementById('footer-velocity').textContent = velocity;\n  document.getElementById('footer-streak').textContent = streak + 'd';\n}\n\nfunction renderAlertBadge() {\n  const alerts = computeAlerts();\n  const badge = document.getElementById('alert-badge');\n  if (alerts.length > 0) {\n    badge.style.display = 'flex';\n    badge.textContent = alerts.length > 99 ? '99+' : alerts.length;\n  } else {\n    badge.style.display = 'none';\n  }\n}\n\nfunction renderTopbar() {\n  const titles = { all: 'Todas as tarefas', day: 'Hoje', week: 'Esta semana', month: 'Mês', eisenhower: 'Matriz Eisenhower', metrics: 'Métricas', goals: 'Metas / OKRs', review: 'Revisão semanal' };\n  document.getElementById('view-title').textContent = titles[state.currentView] || 'Hoje';\n  const now = new Date();\n  document.getElementById('view-date').textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });\n  document.querySelectorAll('.view-tab').forEach(el => { el.classList.toggle('active', el.dataset.view === state.currentView); });\n}\n\nfunction renderContent() {\n  const content = document.getElementById('content');\n  const viewMap = { all: renderAllTasksView, day: renderDayView, week: renderWeekView, month: renderMonthView, eisenhower: renderEisenhowerView, metrics: renderMetricsView, goals: renderGoalsView, review: renderReviewView };\n  const fn = viewMap[state.currentView] || renderDayView;\n  fn(content);\n}\n\n// ============================================================\n// VIEW: DAY\n// ============================================================\n// ============================================================\n// VIEW: ALL TASKS (sortable + filterable table)\n// ============================================================\nfunction applyAllTasksFilters(tasks) {\n  const f = state.allTasksFilters;\n  return tasks.filter(t => {\n    if (!f.showCompleted && t.status === 'done') return false;\n    if (f.project && t.project !== f.project) return false;\n    if (f.status && t.status !== f.status) return false;\n    if (f.priority && t.priority !== f.priority) return false;\n    if (f.tag && !(t.tags || []).includes(f.tag)) return false;\n    if (f.recurrence === 'any' && !t.recurrence) return false;\n    if (f.recurrence && f.recurrence !== 'any' && t.recurrence !== f.recurrence) return false;\n    if (f.dateFrom && (!t.date || t.date < f.dateFrom)) return false;\n    if (f.dateTo && (!t.date || t.date > f.dateTo)) return false;\n    if (f.search) {\n      const q = f.search.toLowerCase();\n      const inTitle = t.title.toLowerCase().includes(q);\n      const inNotes = (t.notes || '').toLowerCase().includes(q);\n      const inTags = (t.tags || []).some(tg => tg.toLowerCase().includes(q));\n      const proj = state.projects.find(p => p.id === t.project);\n      const inProj = proj && proj.name.toLowerCase().includes(q);\n      if (!inTitle && !inNotes && !inTags && !inProj) return false;\n    }\n    return true;\n  });\n}\n\nfunction sortAllTasks(tasks) {\n  const { col, dir } = state.allTasksSort;\n  const mult = dir === 'desc' ? -1 : 1;\n  const projName = id => state.projects.find(p => p.id === id)?.name || '';\n  const statusOrder = { 'doing': 0, 'todo': 1, 'blocked': 2, 'done': 3 };\n  return [...tasks].sort((a, b) => {\n    let av, bv;\n    switch (col) {\n      case 'title': av = a.title.toLowerCase(); bv = b.title.toLowerCase(); break;\n      case 'project': av = projName(a.project).toLowerCase(); bv = projName(b.project).toLowerCase(); break;\n      case 'priority': av = priorityOrder(a.priority); bv = priorityOrder(b.priority); break;\n      case 'date': av = a.date || '9999-99-99'; bv = b.date || '9999-99-99'; break;\n      case 'hours': av = parseFloat(a.hours) || 0; bv = parseFloat(b.hours) || 0; break;\n      case 'status': av = statusOrder[a.status] ?? 9; bv = statusOrder[b.status] ?? 9; break;\n      case 'subs': av = (a.subtasks || []).length; bv = (b.subtasks || []).length; break;\n      case 'created': av = a.createdAt || ''; bv = b.createdAt || ''; break;\n      case 'completed': av = a.completedAt || ''; bv = b.completedAt || ''; break;\n      default: av = a[col] || ''; bv = b[col] || '';\n    }\n    if (av < bv) return -1 * mult;\n    if (av > bv) return 1 * mult;\n    return 0;\n  });\n}\n\nfunction renderAllTasksView(container) {\n  const f = state.allTasksFilters;\n  const filtered = sortAllTasks(applyAllTasksFilters(state.tasks));\n  const total = state.tasks.length;\n\n  // Collect all distinct tags for the filter dropdown\n  const allTags = new Set();\n  state.tasks.forEach(t => (t.tags || []).forEach(tg => allTags.add(tg)));\n  const tagOptions = [...allTags].sort();\n\n  // Detect if any filter is active\n  const activeFilters = !!(f.search || f.project || f.status || f.priority || f.tag || f.recurrence || f.dateFrom || f.dateTo || !f.showCompleted);\n\n  const projectOptions = state.projects.map(p => `<option value=\"${p.id}\" ${f.project===p.id?'selected':''}>${escapeHtml(p.name)}<\u002Foption>`).join('');\n  const tagOptionsHTML = tagOptions.map(tg => `<option value=\"${escapeAttr(tg)}\" ${f.tag===tg?'selected':''}>#${escapeHtml(tg)}<\u002Foption>`).join('');\n\n  const sortInd = (col) => {\n    if (state.allTasksSort.col !== col) return '';\n    return `<span class=\"sort-ind\">${state.allTasksSort.dir === 'asc' ? '▲' : '▼'}<\u002Fspan>`;\n  };\n  const sortedCls = (col) => state.allTasksSort.col === col ? 'sorted' : '';\n\n  container.innerHTML = `\n    <div class=\"alltasks-toolbar\">\n      <div class=\"filter-group\">\n        <input type=\"text\" class=\"filter-input search\" id=\"atf-search\" placeholder=\"Buscar título, notas, tags...\" value=\"${escapeAttr(f.search)}\" oninput=\"updateAllTasksFilter('search', this.value)\">\n      <\u002Fdiv>\n      <div class=\"filter-group\">\n        <span class=\"filter-label\">Projeto:<\u002Fspan>\n        <select class=\"filter-select\" onchange=\"updateAllTasksFilter('project', this.value)\">\n          <option value=\"\">Todos<\u002Foption>\n          ${projectOptions}\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"filter-group\">\n        <span class=\"filter-label\">Status:<\u002Fspan>\n        <select class=\"filter-select\" onchange=\"updateAllTasksFilter('status', this.value)\">\n          <option value=\"\">Todos<\u002Foption>\n          <option value=\"todo\" ${f.status==='todo'?'selected':''}>A fazer<\u002Foption>\n          <option value=\"doing\" ${f.status==='doing'?'selected':''}>Em andamento<\u002Foption>\n          <option value=\"blocked\" ${f.status==='blocked'?'selected':''}>Bloqueada<\u002Foption>\n          <option value=\"done\" ${f.status==='done'?'selected':''}>Concluída<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"filter-group\">\n        <span class=\"filter-label\">Prioridade:<\u002Fspan>\n        <select class=\"filter-select\" onchange=\"updateAllTasksFilter('priority', this.value)\">\n          <option value=\"\">Todas<\u002Foption>\n          <option value=\"p1\" ${f.priority==='p1'?'selected':''}>P1 · Crítica<\u002Foption>\n          <option value=\"p2\" ${f.priority==='p2'?'selected':''}>P2 · Importante<\u002Foption>\n          <option value=\"p3\" ${f.priority==='p3'?'selected':''}>P3 · Normal<\u002Foption>\n          <option value=\"p4\" ${f.priority==='p4'?'selected':''}>P4 · Baixa<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"filter-group\">\n        <span class=\"filter-label\">Tag:<\u002Fspan>\n        <select class=\"filter-select\" onchange=\"updateAllTasksFilter('tag', this.value)\" ${tagOptions.length===0?'disabled':''}>\n          <option value=\"\">Todas<\u002Foption>\n          ${tagOptionsHTML}\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"filter-group\">\n        <span class=\"filter-label\">Recorrência:<\u002Fspan>\n        <select class=\"filter-select\" onchange=\"updateAllTasksFilter('recurrence', this.value)\">\n          <option value=\"\">Todas<\u002Foption>\n          <option value=\"any\" ${f.recurrence==='any'?'selected':''}>Qualquer recorrente<\u002Foption>\n          <option value=\"daily\" ${f.recurrence==='daily'?'selected':''}>Diária<\u002Foption>\n          <option value=\"weekly\" ${f.recurrence==='weekly'?'selected':''}>Semanal<\u002Foption>\n          <option value=\"biweekly\" ${f.recurrence==='biweekly'?'selected':''}>Quinzenal<\u002Foption>\n          <option value=\"monthly\" ${f.recurrence==='monthly'?'selected':''}>Mensal<\u002Foption>\n          <option value=\"monthly-business\" ${f.recurrence==='monthly-business'?'selected':''}>Último dia útil<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"filter-group\">\n        <span class=\"filter-label\">De:<\u002Fspan>\n        <input type=\"date\" class=\"filter-input date\" value=\"${escapeAttr(f.dateFrom)}\" onchange=\"updateAllTasksFilter('dateFrom', this.value)\">\n      <\u002Fdiv>\n      <div class=\"filter-group\">\n        <span class=\"filter-label\">Até:<\u002Fspan>\n        <input type=\"date\" class=\"filter-input date\" value=\"${escapeAttr(f.dateTo)}\" onchange=\"updateAllTasksFilter('dateTo', this.value)\">\n      <\u002Fdiv>\n      <label class=\"filter-toggle ${f.showCompleted?'active':''}\">\n        <input type=\"checkbox\" ${f.showCompleted?'checked':''} onchange=\"updateAllTasksFilter('showCompleted', this.checked)\">\n        ${f.showCompleted ? '✓' : '✗'} Concluídas\n      <\u002Flabel>\n      ${activeFilters ? '<button class=\"filter-clear\" onclick=\"clearAllTasksFilters()\">✕ Limpar filtros<\u002Fbutton>' : ''}\n      <span class=\"filter-count\">${filtered.length}/${total} tarefa${total!==1?'s':''}<\u002Fspan>\n      <button class=\"btn-secondary\" style=\"padding: 5px 10px; font-size: 12px;\" onclick=\"exportFilteredAllTasks()\" title=\"Exportar visíveis para CSV\">📊 CSV<\u002Fbutton>\n    <\u002Fdiv>\n\n    ${state.bulkMode ? renderBulkBar() : ''}\n\n    <div class=\"alltasks-wrapper\">\n      <div class=\"alltasks-scroll\">\n        ${filtered.length === 0 ? `\n          <div class=\"tt-empty\">\n            <div style=\"font-size: 28px; opacity: 0.5; margin-bottom: 8px;\">${activeFilters ? '🔍' : '📋'}<\u002Fdiv>\n            <div>${activeFilters ? 'Nenhuma tarefa corresponde aos filtros.' : 'Nenhuma tarefa cadastrada ainda.'}<\u002Fdiv>\n            ${activeFilters ? '<button class=\"btn-secondary\" style=\"margin-top: 12px;\" onclick=\"clearAllTasksFilters()\">Limpar filtros<\u002Fbutton>' : `<button class=\"btn-primary\" style=\"margin-top: 12px;\" onclick=\"openTaskModal()\">+ Criar primeira tarefa<\u002Fbutton>`}\n          <\u002Fdiv>\n        ` : `\n        <table class=\"tt-table\">\n          <thead>\n            <tr>\n              ${state.bulkMode ? '<th class=\"col-bulk no-sort\"><\u002Fth>' : ''}\n              <th class=\"col-check no-sort\"><\u002Fth>\n              <th class=\"col-prio ${sortedCls('priority')}\" onclick=\"setAllTasksSort('priority')\">Prio${sortInd('priority')}<\u002Fth>\n              <th class=\"col-title ${sortedCls('title')}\" onclick=\"setAllTasksSort('title')\">Tarefa${sortInd('title')}<\u002Fth>\n              <th class=\"col-project ${sortedCls('project')}\" onclick=\"setAllTasksSort('project')\">Projeto${sortInd('project')}<\u002Fth>\n              <th class=\"col-tags no-sort\">Tags<\u002Fth>\n              <th class=\"col-date ${sortedCls('date')}\" onclick=\"setAllTasksSort('date')\">Data${sortInd('date')}<\u002Fth>\n              <th class=\"col-hours ${sortedCls('hours')}\" onclick=\"setAllTasksSort('hours')\">h${sortInd('hours')}<\u002Fth>\n              <th class=\"col-status ${sortedCls('status')}\" onclick=\"setAllTasksSort('status')\">Status${sortInd('status')}<\u002Fth>\n              <th class=\"col-subs ${sortedCls('subs')}\" onclick=\"setAllTasksSort('subs')\" title=\"Subtarefas\">☑${sortInd('subs')}<\u002Fth>\n              <th class=\"col-recur no-sort\" title=\"Recorrência\">↻<\u002Fth>\n              <th class=\"col-created ${sortedCls('created')}\" onclick=\"setAllTasksSort('created')\">Criada${sortInd('created')}<\u002Fth>\n              <th class=\"col-completed ${sortedCls('completed')}\" onclick=\"setAllTasksSort('completed')\">Concluída${sortInd('completed')}<\u002Fth>\n              <th class=\"col-actions no-sort\"><\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            ${filtered.map(t => allTasksRowHTML(t)).join('')}\n          <\u002Ftbody>\n        <\u002Ftable>\n        `}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction allTasksRowHTML(t) {\n  const proj = state.projects.find(p => p.id === t.project);\n  const todayStr = todayISO();\n  const isOverdue = t.date && t.date < todayStr && t.status !== 'done';\n  const isSelected = state.bulkSelection.has(t.id);\n  const subs = t.subtasks || [];\n  const subDone = subs.filter(s => s.done).length;\n  const statusLabels = { todo: 'A fazer', doing: 'Andamento', blocked: 'Bloqueada', done: 'Concluída' };\n  return `\n    <tr class=\"${t.status === 'done' ? 'done' : ''} ${isOverdue ? 'overdue' : ''} ${isSelected ? 'selected' : ''}\">\n      ${state.bulkMode ? `<td class=\"col-bulk no-strike\"><div class=\"task-bulk ${isSelected?'checked':''}\" style=\"display:inline-flex;\" onclick=\"toggleBulkSelect('${t.id}')\"><\u002Fdiv><\u002Ftd>` : ''}\n      <td class=\"col-check no-strike\"><div class=\"task-checkbox ${t.status === 'done' ? 'checked' : ''}\" style=\"width: 16px; height: 16px;\" onclick=\"toggleTaskDone('${t.id}')\"><\u002Fdiv><\u002Ftd>\n      <td class=\"col-prio no-strike\"><span class=\"tt-prio-badge ${t.priority}\">${t.priority.toUpperCase()}<\u002Fspan><\u002Ftd>\n      <td class=\"col-title\" onclick=\"openTaskModal('${t.id}')\">${escapeHtml(t.title)}<\u002Ftd>\n      <td class=\"col-project no-strike\">${proj ? `<span class=\"tt-project-cell\"><span class=\"project-dot\" style=\"background:${proj.color}\"><\u002Fspan>${escapeHtml(proj.name)}<\u002Fspan>` : '<span style=\"color:var(--text-faint);\">—<\u002Fspan>'}<\u002Ftd>\n      <td class=\"col-tags no-strike\"><div class=\"tt-tags\">${(t.tags || []).slice(0, 3).map(tg => `<span class=\"task-tag-chip\">#${escapeHtml(tg)}<\u002Fspan>`).join('')}${(t.tags||[]).length>3?`<span class=\"task-tag-chip\">+${t.tags.length-3}<\u002Fspan>`:''}<\u002Fdiv><\u002Ftd>\n      <td class=\"col-date\">${t.date ? fmtDateBR(t.date) : '—'}<\u002Ftd>\n      <td class=\"col-hours\">${t.hours ? t.hours + 'h' : '—'}<\u002Ftd>\n      <td class=\"col-status no-strike\"><span class=\"tt-status-badge tt-status-${t.status}\">${statusLabels[t.status]}<\u002Fspan><\u002Ftd>\n      <td class=\"col-subs\">${subs.length ? subDone + '/' + subs.length : '—'}<\u002Ftd>\n      <td class=\"col-recur no-strike\">${t.recurrence ? `<span title=\"${recurrenceLabel(t.recurrence)}\" style=\"color:var(--info);\">↻<\u002Fspan>` : ''}<\u002Ftd>\n      <td class=\"col-created\">${t.createdAt ? fmtDateShort(t.createdAt.slice(0,10)) : ''}<\u002Ftd>\n      <td class=\"col-completed\">${t.completedAt ? fmtDateShort(t.completedAt.slice(0,10)) : ''}<\u002Ftd>\n      <td class=\"col-actions no-strike\">\n        <button class=\"task-action timer-btn\" onclick=\"event.stopPropagation(); startPomodoroForTask('${t.id}')\" title=\"Pomodoro\">⏱<\u002Fbutton>\n        <button class=\"task-action\" onclick=\"event.stopPropagation(); openTaskModal('${t.id}')\" title=\"Editar\">✎<\u002Fbutton>\n      <\u002Ftd>\n    <\u002Ftr>\n  `;\n}\n\nfunction updateAllTasksFilter(key, value) {\n  state.allTasksFilters[key] = value;\n  saveState();\n  renderContent();\n  renderSidebar();\n}\n\nfunction setAllTasksSort(col) {\n  if (state.allTasksSort.col === col) {\n    state.allTasksSort.dir = state.allTasksSort.dir === 'asc' ? 'desc' : 'asc';\n  } else {\n    state.allTasksSort.col = col;\n    state.allTasksSort.dir = 'asc';\n  }\n  saveState();\n  renderContent();\n}\n\nfunction clearAllTasksFilters() {\n  state.allTasksFilters = { ...defaultState.allTasksFilters };\n  saveState();\n  renderContent();\n  renderSidebar();\n}\n\nfunction exportFilteredAllTasks() {\n  const filtered = sortAllTasks(applyAllTasksFilters(state.tasks));\n  if (filtered.length === 0) { toast('Nada para exportar', 'danger'); return; }\n  const escape = v => { if (v == null) return ''; const s = String(v); return /[,\"\\n]/.test(s) ? `\"${s.replace(/\"/g, '\"\"')}\"` : s; };\n  let csv = 'Title,Project,Date,Priority,Importance,Status,Hours,Tags,Recurrence,Subtasks,Notes,CreatedAt,CompletedAt\\n';\n  filtered.forEach(t => {\n    const projName = state.projects.find(p => p.id === t.project)?.name || '';\n    const subs = (t.subtasks || []).length ? `${(t.subtasks || []).filter(s=>s.done).length}/${(t.subtasks || []).length}` : '';\n    csv += [t.title, projName, t.date || '', t.priority, t.importance || '', t.status, t.hours || '', (t.tags || []).join('; '), t.recurrence || '', subs, t.notes || '', t.createdAt || '', t.completedAt || ''].map(escape).join(',') + '\\n';\n  });\n  downloadFile(`tarefas-filtradas-${todayISO()}.csv`, csv, 'text/csv');\n  toast(`📊 ${filtered.length} tarefa(s) exportada(s)`, 'success');\n}\n\nfunction renderDayView(container) {\n  const todayStr = todayISO();\n  const todayTasks = tasksForView('day');\n  const pending = todayTasks.filter(t => t.status !== 'done');\n  const overdue = pending.filter(t => t.date && t.date < todayStr);\n  const dueToday = pending.filter(t => !t.date || t.date === todayStr);\n  const done = todayTasks.filter(t => t.status === 'done');\n  const totalHours = todayTasks.reduce((s, t) => s + (parseFloat(t.hours) || 0), 0);\n  const doneHours = done.reduce((s, t) => s + (parseFloat(t.hours) || 0), 0);\n  const blocked = todayTasks.filter(t => t.status === 'blocked').length;\n  const alerts = computeAlerts();\n  const urgentAlerts = alerts.filter(a => a.type === 'danger');\n\n  let alertHTML = '';\n  if (urgentAlerts.length > 0) {\n    alertHTML = `<div class=\"alert-banner danger\">\n      <span>⚠️<\u002Fspan>\n      <div class=\"alert-banner-text\"><strong>${urgentAlerts.length} item${urgentAlerts.length !== 1 ? 's' : ''} crítico${urgentAlerts.length !== 1 ? 's' : ''}<\u002Fstrong> · ${escapeHtml(urgentAlerts.slice(0, 2).map(a => a.title).join(', '))}${urgentAlerts.length > 2 ? '...' : ''}<\u002Fdiv>\n      <button class=\"btn-secondary\" onclick=\"openAlerts()\" style=\"padding: 4px 10px; font-size: 12px;\">Ver alertas<\u002Fbutton>\n    <\u002Fdiv>`;\n  }\n\n  container.innerHTML = `\n    ${alertHTML}\n    <div class=\"day-stats\">\n      <div class=\"stat-card ${pending.length > state.settings.dailyLimit ? 'accent' : ''}\">\n        <div class=\"stat-card-label\">Pendentes<\u002Fdiv>\n        <div class=\"stat-card-value\">${pending.length}<\u002Fdiv>\n        <div class=\"stat-card-sub\">${overdue.length > 0 ? `${overdue.length} atrasada${overdue.length !== 1 ? 's' : ''}` : `${done.length} concluídas`}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-card\">\n        <div class=\"stat-card-label\">Esforço<\u002Fdiv>\n        <div class=\"stat-card-value\">${totalHours.toFixed(1)}h<\u002Fdiv>\n        <div class=\"stat-card-sub\">${doneHours.toFixed(1)}h realizadas · meta ${state.settings.dailyHours}h<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-card\">\n        <div class=\"stat-card-label\">Bloqueadas<\u002Fdiv>\n        <div class=\"stat-card-value\" style=\"color:${blocked > 0 ? 'var(--danger)' : 'var(--text)'}\">${blocked}<\u002Fdiv>\n        <div class=\"stat-card-sub\">${blocked > 0 ? 'requerem ação' : 'tudo fluindo'}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-card\">\n        <div class=\"stat-card-label\">Progresso<\u002Fdiv>\n        <div class=\"stat-card-value\">${todayTasks.length ? Math.round((done.length / todayTasks.length) * 100) : 0}%<\u002Fdiv>\n        <div class=\"stat-card-sub\">conclusão do dia<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"day-grid\" style=\"margin-top:16px;\">\n      <div class=\"focus-section\">\n        <div class=\"quick-add\">\n          <span style=\"color: var(--text-faint);\">+<\u002Fspan>\n          <input type=\"text\" id=\"quick-add-input\" placeholder=\"Adicionar tarefa para hoje · prefixe com !p1, #tag, @projeto\" onkeydown=\"if(event.key==='Enter') quickAdd()\">\n          <span class=\"quick-add-hint\">Enter<\u002Fspan>\n        <\u002Fdiv>\n\n        ${state.bulkMode ? renderBulkBar() : ''}\n\n        ${overdue.length > 0 ? `\n          <div class=\"section-header\"><div class=\"section-title\">⚠️ Atrasadas <span class=\"section-count\" style=\"background: var(--danger-soft); color: var(--danger);\">${overdue.length}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"task-list\">${overdue.sort((a,b) => priorityOrder(a.priority) - priorityOrder(b.priority)).map(t => taskItemHTML(t, true)).join('')}<\u002Fdiv>\n        ` : ''}\n\n        <div class=\"section-header\"><div class=\"section-title\">⚡ Foco do dia <span class=\"section-count\">${dueToday.length}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"task-list\">\n          ${dueToday.length ? dueToday.sort((a,b) => priorityOrder(a.priority) - priorityOrder(b.priority)).map(t => taskItemHTML(t)).join('') : `<div class=\"empty-state\">${svgEmpty('focus')}<div class=\"empty-title\">Dia limpo<\u002Fdiv><div class=\"empty-sub\">Nenhuma tarefa pendente para hoje. Use o quick-add acima para planejar suas próximas entregas.<\u002Fdiv><\u002Fdiv>`}\n        <\u002Fdiv>\n\n        ${done.length ? `\n          <div class=\"section-header\"><div class=\"section-title\">✅ Concluídas <span class=\"section-count\">${done.length}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"task-list\">${done.map(t => taskItemHTML(t)).join('')}<\u002Fdiv>\n        ` : ''}\n      <\u002Fdiv>\n\n      <aside class=\"project-panel\">\n        <div class=\"section-header\"><div class=\"section-title\">📌 Projetos ativos<\u002Fdiv><\u002Fdiv>\n        ${renderProjectCards()}\n        ${renderMiniMetricsPanel()}\n      <\u002Faside>\n    <\u002Fdiv>\n  `;\n}\n\nfunction renderMiniMetricsPanel() {\n  const last7 = [];\n  for (let i = 6; i >= 0; i--) {\n    const d = new Date(); d.setDate(d.getDate() - i);\n    const iso = isoFromDate(d);\n    const count = state.tasks.filter(t => t.completedAt && t.completedAt.slice(0, 10) === iso).length;\n    last7.push({ iso, count, label: d.toLocaleDateString('pt-BR', { weekday: 'short' }).slice(0, 3) });\n  }\n  const max = Math.max(...last7.map(d => d.count), 1);\n  return `\n    <div class=\"card chart-card\">\n      <div class=\"card-title\">Últimos 7 dias<\u002Fdiv>\n      <div class=\"card-sub\">Tarefas concluídas<\u002Fdiv>\n      <div style=\"display: flex; align-items: flex-end; gap: 4px; height: 70px; margin-top: 14px;\">\n        ${last7.map(d => `\n          <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;\">\n            <div style=\"width: 100%; background: ${d.count > 0 ? 'var(--primary)' : 'var(--border)'}; border-radius: 3px 3px 0 0; height: ${Math.max(4, (d.count / max) * 56)}px; transition: all 0.3s;\" title=\"${d.count} tarefas\"><\u002Fdiv>\n            <div style=\"font-size: 9px; color: var(--text-muted); font-family: var(--font-mono);\">${d.label}<\u002Fdiv>\n          <\u002Fdiv>\n        `).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction renderBulkBar() {\n  const n = state.bulkSelection.size;\n  return `<div class=\"card\" style=\"padding: 10px 14px; display: flex; align-items: center; gap: 10px; background: var(--primary-soft); border-color: var(--primary);\">\n    <strong style=\"font-size: 13px;\">${n} selecionada${n !== 1 ? 's' : ''}<\u002Fstrong>\n    <div style=\"flex: 1;\"><\u002Fdiv>\n    <button class=\"btn-secondary\" onclick=\"bulkSetStatus('done')\">Concluir<\u002Fbutton>\n    <button class=\"btn-secondary\" onclick=\"bulkMoveDate('today')\">Mover p/ hoje<\u002Fbutton>\n    <button class=\"btn-secondary\" onclick=\"bulkMoveDate('tomorrow')\">Mover p/ amanhã<\u002Fbutton>\n    <button class=\"btn-secondary\" onclick=\"bulkMoveDate('week')\">Próxima semana<\u002Fbutton>\n    <button class=\"btn-danger\" onclick=\"bulkDelete()\">Excluir<\u002Fbutton>\n    <button class=\"btn-secondary\" onclick=\"toggleBulkMode()\">Cancelar<\u002Fbutton>\n  <\u002Fdiv>`;\n}\n\n// ============================================================\n// VIEW: WEEK (kanban with drag/drop)\n// ============================================================\nfunction renderWeekView(container) {\n  const now = new Date();\n  const start = startOfWeek(now);\n  const weekDays = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];\n  const todayStr = todayISO();\n\n  let columnsHTML = '';\n  for (let i = 0; i < 7; i++) {\n    const d = new Date(start); d.setDate(start.getDate() + i);\n    const iso = isoFromDate(d);\n    const isToday = iso === todayStr;\n    const dayTasks = getFilteredTasks().filter(t => t.date === iso);\n    columnsHTML += `\n      <div class=\"day-column ${isToday ? 'today' : ''}\" data-date=\"${iso}\" ondragover=\"weekDragOver(event, this)\" ondragleave=\"this.classList.remove('drag-over')\" ondrop=\"weekDrop(event, '${iso}', this)\">\n        <div class=\"day-column-header\">\n          <div><div class=\"day-name\">${weekDays[i]}<\u002Fdiv><div class=\"day-num\">${d.getDate()}<\u002Fdiv><\u002Fdiv>\n          <button class=\"task-action\" onclick=\"openTaskModal(null, '${iso}')\" title=\"Adicionar\">+<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"day-tasks\">\n          ${dayTasks.length ? dayTasks.sort((a,b) => priorityOrder(a.priority) - priorityOrder(b.priority)).map(t => weekTaskHTML(t)).join('') : '<div style=\"font-size:11px;color:var(--text-faint);padding:6px;text-align:center;\">—<\u002Fdiv>'}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }\n\n  container.innerHTML = `\n    <div class=\"week-grid\">${columnsHTML}<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;\">\n      <div class=\"card\"><div class=\"card-header\"><div><div class=\"card-title\">Carga por projeto<\u002Fdiv><div class=\"card-sub\">Horas estimadas nesta semana<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"chart-container\"><canvas id=\"week-load-chart\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-header\"><div><div class=\"card-title\">Status das tarefas<\u002Fdiv><div class=\"card-sub\">Distribuição da semana<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"chart-container\"><canvas id=\"week-status-chart\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"margin-top: 14px;\">\n      <div class=\"card-header\"><div><div class=\"card-title\">Carga diária<\u002Fdiv><div class=\"card-sub\">Horas estimadas por dia (linha pontilhada = meta de ${state.settings.dailyHours}h)<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"chart-container\"><canvas id=\"week-daily-chart\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  setTimeout(() => { renderWeekCharts(); }, 50);\n}\n\n// ============================================================\n// VIEW: MONTH (with navigation)\n// ============================================================\nfunction renderMonthView(container) {\n  const now = new Date();\n  const offset = state.settings.monthOffset || 0;\n  const refDate = new Date(now.getFullYear(), now.getMonth() + offset, 1);\n  const year = refDate.getFullYear();\n  const month = refDate.getMonth();\n  const first = new Date(year, month, 1);\n  const last = new Date(year, month + 1, 0);\n  const startDay = (first.getDay() + 6) % 7;\n  const totalCells = Math.ceil((startDay + last.getDate()) / 7) * 7;\n  const todayStr = todayISO();\n  const monthName = refDate.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });\n\n  const headers = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'].map(h => `<div class=\"cal-header\">${h}<\u002Fdiv>`).join('');\n\n  let cellsHTML = '';\n  for (let i = 0; i < totalCells; i++) {\n    const dayNum = i - startDay + 1;\n    const inMonth = dayNum >= 1 && dayNum <= last.getDate();\n    let cellDate, displayNum;\n    if (inMonth) {\n      cellDate = new Date(year, month, dayNum);\n      displayNum = dayNum;\n    } else if (dayNum < 1) {\n      const prevMonthLast = new Date(year, month, 0);\n      cellDate = new Date(year, month - 1, prevMonthLast.getDate() + dayNum);\n      displayNum = cellDate.getDate();\n    } else {\n      cellDate = new Date(year, month + 1, dayNum - last.getDate());\n      displayNum = cellDate.getDate();\n    }\n    const iso = isoFromDate(cellDate);\n    const isToday = iso === todayStr;\n    const dayTasks = getFilteredTasks().filter(t => t.date === iso);\n    const visible = dayTasks.slice(0, 3);\n    const more = dayTasks.length - 3;\n\n    cellsHTML += `\n      <div class=\"cal-day ${!inMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}\" data-date=\"${iso}\" onclick=\"if(${inMonth}) openTaskModal(null, '${iso}')\" ondragover=\"weekDragOver(event, this)\" ondragleave=\"this.classList.remove('drag-over')\" ondrop=\"weekDrop(event, '${iso}', this)\">\n        <div class=\"cal-day-num\">${displayNum}<\u002Fdiv>\n        ${visible.map(t => `<div class=\"cal-task ${t.priority} ${t.status==='done'?'done':''}\" title=\"${escapeAttr(t.title)}\" draggable=\"true\" ondragstart=\"weekDragStart(event, '${t.id}')\" onclick=\"event.stopPropagation(); openTaskModal('${t.id}')\">${escapeHtml(t.title.slice(0,22))}<\u002Fdiv>`).join('')}\n        ${more > 0 ? `<div class=\"cal-more\">+${more} mais<\u002Fdiv>` : ''}\n      <\u002Fdiv>\n    `;\n  }\n\n  container.innerHTML = `\n    <div class=\"cal-nav\">\n      <div class=\"cal-nav-title\">${monthName.charAt(0).toUpperCase() + monthName.slice(1)}<\u002Fdiv>\n      <div style=\"display: flex; gap: 6px;\">\n        <button class=\"btn-secondary\" onclick=\"changeMonth(-1)\">‹ Anterior<\u002Fbutton>\n        <button class=\"btn-secondary\" onclick=\"changeMonth(0)\">Hoje<\u002Fbutton>\n        <button class=\"btn-secondary\" onclick=\"changeMonth(1)\">Próximo ›<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"month-grid\">\n      <div><div class=\"calendar\">${headers}${cellsHTML}<\u002Fdiv><\u002Fdiv>\n      <aside class=\"project-panel\">\n        <div class=\"card chart-card\">\n          <div class=\"card-title\">Distribuição mensal<\u002Fdiv>\n          <div class=\"card-sub\" style=\"margin-bottom:12px;\">Tarefas por projeto<\u002Fdiv>\n          <div class=\"chart-container\"><canvas id=\"month-chart\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card chart-card\">\n          <div class=\"card-title\">Progresso por projeto<\u002Fdiv>\n          <div class=\"card-sub\" style=\"margin-bottom:12px;\">Concluídas vs pendentes<\u002Fdiv>\n          <div class=\"chart-container sm\"><canvas id=\"month-progress-chart\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"section-header\"><div class=\"section-title\">📌 Projetos<\u002Fdiv><\u002Fdiv>\n        ${renderProjectCards()}\n      <\u002Faside>\n    <\u002Fdiv>\n  `;\n  setTimeout(() => { renderMonthCharts(); }, 50);\n}\n\nfunction changeMonth(delta) {\n  if (delta === 0) state.settings.monthOffset = 0;\n  else state.settings.monthOffset = (state.settings.monthOffset || 0) + delta;\n  saveState();\n  render();\n}\n\n// ============================================================\n// VIEW: EISENHOWER\n// ============================================================\nfunction renderEisenhowerView(container) {\n  const tasks = getFilteredTasks().filter(t => t.status !== 'done');\n  const today = todayISO();\n  const inThreeDays = new Date(); inThreeDays.setDate(inThreeDays.getDate() + 3);\n  const inThreeDaysIso = isoFromDate(inThreeDays);\n  const isUrgent = t => (t.date && t.date <= inThreeDaysIso) || t.priority === 'p1';\n  const isImportant = t => t.importance === 'high' || t.priority === 'p1' || t.priority === 'p2';\n\n  const q1 = tasks.filter(t => isUrgent(t) && isImportant(t));\n  const q2 = tasks.filter(t => !isUrgent(t) && isImportant(t));\n  const q3 = tasks.filter(t => isUrgent(t) && !isImportant(t));\n  const q4 = tasks.filter(t => !isUrgent(t) && !isImportant(t));\n\n  const renderQuad = (tasks, qClass, title, sub, advice) => `\n    <div class=\"eisen-quad ${qClass}\">\n      <div class=\"eisen-header\">\n        <div style=\"display: flex; justify-content: space-between; align-items: center;\">\n          <div class=\"eisen-title\">${title}<\u002Fdiv>\n          <span class=\"section-count\">${tasks.length}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"eisen-sub\">${sub} <em style=\"color: var(--text-faint);\">· ${advice}<\u002Fem><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"eisen-tasks\">\n        ${tasks.length ? tasks.sort((a,b) => priorityOrder(a.priority) - priorityOrder(b.priority)).map(t => taskItemHTML(t)).join('') : '<div class=\"empty-state\" style=\"padding: 20px;\"><div style=\"font-size: 22px; opacity: 0.5;\">—<\u002Fdiv><\u002Fdiv>'}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n\n  container.innerHTML = `\n    <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;\">\n      <div>\n        <h3 style=\"font-size: 15px; font-weight: 600;\">Matriz Eisenhower<\u002Fh3>\n        <div style=\"font-size: 12px; color: var(--text-muted);\">Urgente = vence nos próximos 3 dias ou P1 · Importante = importância alta ou P1/P2<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"eisen-grid\">\n      ${renderQuad(q1, 'q1', '🔥 Fazer agora', 'Urgente + Import
