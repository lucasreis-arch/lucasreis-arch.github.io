iskProjects: state.projects.filter(p => p.status === 'at-risk' || p.status === 'blocked').length\n    },\n    tasks: state.tasks.filter(t => t.status !== 'done').map(t => ({\n      id: t.id, title: t.title, project: t.project, date: t.date, priority: t.priority, status: t.status, tags: t.tags\n    })),\n    digest: buildDigest('day')\n  };\n  toast('Enviando para n8n...');\n  try {\n    await fetch(state.settings.n8nWebhook, {\n      method: 'POST',\n      mode: 'no-cors',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify(payload)\n    });\n    toast('✅ Enviado para n8n', 'success');\n    logActivity('integration', null, 'n8n-sent', eventType);\n  } catch (e) {\n    toast('Falha ao enviar para n8n: ' + e.message, 'danger');\n  }\n}\n\n// ============================================================\n// EXPORTS\n// ============================================================\nfunction downloadFile(name, content, mime) {\n  const blob = new Blob([content], { type: mime });\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href = url; a.download = name;\n  document.body.appendChild(a); a.click(); document.body.removeChild(a);\n  setTimeout(() => URL.revokeObjectURL(url), 1000);\n}\n\nfunction exportICS() {\n  const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Asaas//Reporting Hub//PT', 'CALSCALE:GREGORIAN'];\n  state.tasks.filter(t => t.date && t.status !== 'done').forEach(t => {\n    const dt = t.date.replace(/-/g, '');\n    const proj = state.projects.find(p => p.id === t.project);\n    const summary = `${t.priority === 'p1' ? '🔴' : t.priority === 'p2' ? '🟡' : '⚪'} ${t.title}`;\n    const desc = `${proj ? 'Projeto: ' + proj.name + '\\\\n' : ''}Prioridade: ${priorityLabel(t.priority)}\\\\nStatus: ${t.status}${t.tags && t.tags.length ? '\\\\nTags: ' + t.tags.join(', ') : ''}${t.notes ? '\\\\n\\\\n' + t.notes.replace(/\\n/g, '\\\\n') : ''}`;\n    lines.push('BEGIN:VEVENT', `UID:${t.id}@asaas-reporting-hub`, `DTSTART;VALUE=DATE:${dt}`, `DTEND;VALUE=DATE:${dt}`, `SUMMARY:${summary}`, `DESCRIPTION:${desc}`, 'END:VEVENT');\n  });\n  lines.push('END:VCALENDAR');\n  downloadFile(`asaas-reporting-${todayISO()}.ics`, lines.join('\\r\\n'), 'text/calendar');\n  toast('📆 .ics gerado · importe no Google Calendar', 'success');\n}\n\nfunction exportJSON() {\n  const backup = {\n    exportedAt: new Date().toISOString(),\n    version: 'v2',\n    projects: state.projects,\n    tasks: state.tasks,\n    goals: state.goals,\n    weeklyReviews: state.weeklyReviews,\n    pomodoroSessions: state.pomodoroSessions,\n    activity: state.activity,\n    settings: state.settings\n  };\n  downloadFile(`asaas-reporting-backup-${todayISO()}.json`, JSON.stringify(backup, null, 2), 'application/json');\n  toast('💾 Backup baixado', 'success');\n}\n\nfunction importJSON(event) {\n  const file = event.target.files[0];\n  if (!file) return;\n  const reader = new FileReader();\n  reader.onload = (e) => {\n    try {\n      const data = JSON.parse(e.target.result);\n      if (!confirm('Importar substituirá os dados atuais. Continuar?')) { event.target.value = ''; return; }\n      if (data.projects) state.projects = data.projects;\n      if (data.tasks) state.tasks = data.tasks;\n      if (data.goals) state.goals = data.goals;\n      if (data.weeklyReviews) state.weeklyReviews = data.weeklyReviews;\n      if (data.pomodoroSessions) state.pomodoroSessions = data.pomodoroSessions;\n      if (data.activity) state.activity = data.activity;\n      if (data.settings) state.settings = { ...defaultSettings, ...data.settings };\n      saveState(); render();\n      toast('✅ Backup importado', 'success');\n    } catch (err) {\n      toast('Arquivo inválido: ' + err.message, 'danger');\n    }\n    event.target.value = '';\n  };\n  reader.readAsText(file);\n}\n\nfunction exportCSV(type) {\n  const escape = v => { if (v == null) return ''; const s = String(v); return /[,\"\\n]/.test(s) ? `\"${s.replace(/\"/g, '\"\"')}\"` : s; };\n  let csv = '', filename = '';\n  if (type === 'projects') {\n    csv = 'Name,Area,Status,Deadline,Jira,Description,Color\\n';\n    state.projects.forEach(p => { csv += [p.name, p.area, p.status, p.deadline || '', p.jira || '', p.description || '', p.color].map(escape).join(',') + '\\n'; });\n    filename = 'projects.csv';\n  } else if (type === 'tasks') {\n    csv = 'Title,Project,Date,Priority,Importance,Status,Hours,Tags,Recurrence,Notes,CreatedAt,CompletedAt\\n';\n    state.tasks.forEach(t => {\n      const projName = state.projects.find(p => p.id === t.project)?.name || '';\n      csv += [t.title, projName, t.date || '', t.priority, t.importance || '', t.status, t.hours || '', (t.tags || []).join('; '), t.recurrence || '', t.notes || '', t.createdAt || '', t.completedAt || ''].map(escape).join(',') + '\\n';\n    });\n    filename = 'tasks.csv';\n  } else if (type === 'goals') {\n    csv = 'Title,Type,Target,Current,Unit,Period,Project,MonthKey,Notes\\n';\n    state.goals.forEach(g => {\n      const projName = state.projects.find(p => p.id === g.projectId)?.name || '';\n      csv += [g.title, g.type, g.target, g.current, g.unit || '', g.period, projName, g.monthKey || '', g.notes || ''].map(escape).join(',') + '\\n';\n    });\n    filename = 'goals.csv';\n  }\n  downloadFile(filename, csv, 'text/csv');\n  toast(`📊 ${filename} baixado · importável no Notion`, 'success');\n}\n\n// ============================================================\n// REVIEW\n// ============================================================\nfunction saveReview() {\n  const weekKey = getWeekISO(new Date());\n  state.weeklyReviews[weekKey] = {\n    delivered: document.getElementById('review-delivered')?.value || '',\n    blocked: document.getElementById('review-blocked')?.value || '',\n    wins: document.getElementById('review-wins')?.value || '',\n    lessons: document.getElementById('review-lessons')?.value || '',\n    priorities: document.getElementById('review-priorities')?.value || ''\n  };\n  saveState();\n}\n\nfunction copyWeekReview() {\n  saveReview();\n  const text = buildDigest('review');\n  navigator.clipboard.writeText(text).then(\n    () => toast('📋 Review copiado', 'success'),\n    () => toast('Falha ao copiar', 'danger')\n  );\n}\n\n// ============================================================\n// VIEW SWITCH\n// ============================================================\nfunction switchView(view) {\n  state.currentView = view;\n  if (view !== 'month') state.settings.monthOffset = 0;\n  saveState(); render();\n}\n\n// ============================================================\n// EXPORT DROPDOWN\n// ============================================================\nfunction toggleExport() { document.getElementById('export-menu').classList.toggle('open'); }\ndocument.addEventListener('click', (e) => {\n  if (!e.target.closest('.dropdown')) {\n    document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));\n  }\n});\n\n// ============================================================\n// KEYBOARD SHORTCUTS\n// ============================================================\nlet gPrefix = false;\ndocument.addEventListener('keydown', (e) => {\n  // Cmd+K / Ctrl+K\n  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openCmdPalette(); return; }\n\n  // Don't intercept when typing in an input/textarea (except Esc)\n  const inField = ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName);\n\n  if (e.key === 'Escape') {\n    closeCmdPalette();\n    closeAlerts();\n    if (document.getElementById('task-modal').classList.contains('open')) closeTaskModal();\n    if (document.getElementById('project-modal').classList.contains('open')) closeProjectModal();\n    if (document.getElementById('goal-modal').classList.contains('open')) closeGoalModal();\n    if (document.getElementById('settings-modal').classList.contains('open')) closeSettings();\n    document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));\n    return;\n  }\n\n  if (inField) return;\n\n  // Vim-style g-prefix\n  if (gPrefix) {\n    if (e.key === 'a') { switchView('all'); gPrefix = false; return; }\n    if (e.key === 'd') { switchView('day'); gPrefix = false; return; }\n    if (e.key === 'w') { switchView('week'); gPrefix = false; return; }\n    if (e.key === 'm') { switchView('month'); gPrefix = false; return; }\n    if (e.key === 'e') { switchView('eisenhower'); gPrefix = false; return; }\n    if (e.key === 's') { switchView('metrics'); gPrefix = false; return; }\n    if (e.key === 'r') { switchView('review'); gPrefix = false; return; }\n    gPrefix = false;\n  }\n  if (e.key === 'g') { gPrefix = true; setTimeout(() => gPrefix = false, 1500); return; }\n\n  // Single keys\n  if (e.key === 'n') { e.preventDefault(); openTaskModal(); }\n  else if (e.key === 'f') { e.preventDefault(); openPomodoro(); }\n  else if (e.key === 'a') { e.preventDefault(); openAlerts(); }\n  else if (e.key === '/') { e.preventDefault(); document.getElementById('global-search').focus(); }\n  else if (e.key === '?') {\n    e.preventDefault();\n    alert('Atalhos:\\n\\n⌘K · Paleta de comandos\\nN · Nova tarefa\\nF · Pomodoro\\nA · Alertas\\n/ · Buscar\\nG depois A/D/W/M/E/S/R · Trocar de visão\\n  (A=todas · D=dia · W=semana · M=mês · E=Eisenhower · S=stats · R=review)\\nEsc · Fechar modais\\n? · Esta ajuda');\n  }\n});\n\n// ============================================================\n// INIT\n// ============================================================\nfunction catchUpRecurrences() {\n  // Find completed recurring tasks whose next instance doesn't exist yet\n  const recurringDone = state.tasks.filter(t => t.recurrence && t.status === 'done');\n  recurringDone.forEach(t => {\n    const parentId = t.recurringParentId || t.id;\n    // Find the latest in the chain (including this one)\n    const chain = state.tasks.filter(x => (x.recurringParentId || x.id) === parentId);\n    const latest = chain.sort((a, b) => (b.date || '').localeCompare(a.date || ''))[0];\n    if (latest && latest.status === 'done' && latest.recurrence) spawnRecurringTask(latest);\n  });\n}\n\ndocument.addEventListener('click', (e) => {\n  const navItem = e.target.closest('.nav-item[data-view]');\n  if (navItem) { switchView(navItem.dataset.view); return; }\n  const viewTab = e.target.closest('.view-tab[data-view]');\n  if (viewTab) { switchView(viewTab.dataset.view); return; }\n});\n\n// Periodic re-render for time-sensitive UI (overdue counts etc)\nsetInterval(() => { if (state.currentView === 'day') render(); else renderAlertBadge(); }, 60000);\n\n// Update pomodoro mini display every second when running\nsetInterval(updatePomoMini, 1000);\n\n// Boot\ncatchUpRecurrences();\nsaveState();\nrender();\n\n// Welcome notification check on first run\nif (!localStorage.getItem(STORAGE_KEY + '_seen_welcome')) {\n  setTimeout(() => {\n    toast('👋 Bem-vindo! Pressione ⌘K para abrir a paleta de comandos.', 'success');\n    localStorage.setItem(STORAGE_KEY + '_seen_welcome', '1');\n  }, 800);\n}\n\n<\u002Fscript>\n\n<script>\n// ============================================================\n// VISUAL ENHANCEMENTS (non-invasive · layered on top of existing JS)\n// ============================================================\n(function () {\n  'use strict';\n  const reduceMotion = () => window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n  // ---- Chart.js global polish (tension 0.4) ----\n  if (window.Chart) {\n    try {\n      Chart.defaults.elements.line.tension = 0.4;\n      Chart.defaults.font.family = 'Space Grotesk';\n    } catch (e) {}\n  }\n\n  // ---- Animated count-up on numeric stat / metric values ----\n  function countUp(el) {\n    const raw = (el.textContent || '').trim();\n    const m = raw.match(/^(-?[\\d.]+)(.*)$/);\n    if (!m) return;\n    const target = parseFloat(m[1]);\n    if (isNaN(target) || target === 0) return;\n    const suffix = m[2] || '';\n    const decimals = (m[1].split('.')[1] || '').length;\n    const fmt = v => decimals ? v.toFixed(decimals) : String(Math.round(v));\n    const dur = 620, t0 = performance.now();\n    function tick(now) {\n      const p = Math.min(1, (now - t0) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      if (p < 1) { el.textContent = fmt(target * e) + suffix; requestAnimationFrame(tick); }\n      else { el.textContent = m[1] + suffix; }\n    }\n    requestAnimationFrame(tick);\n  }\n\n  // ---- 7-day completion sparkline ----\n  function last7Completed() {\n    const out = [];\n    for (let i = 6; i >= 0; i--) {\n      const d = new Date(); d.setDate(d.getDate() - i);\n      const iso = (typeof isoFromDate === 'function') ? isoFromDate(d) : d.toISOString().slice(0, 10);\n      out.push(state.tasks.filter(t => t.completedAt && t.completedAt.slice(0, 10) === iso).length);\n    }\n    return out;\n  }\n  function sparkSVG(vals) {\n    const w = 100, h = 24, max = Math.max.apply(null, vals.concat(1)), n = vals.length;\n    const pts = vals.map((v, i) => [n > 1 ? (i / (n - 1)) * w : 0, h - (v / max) * (h - 5) - 2.5]);\n    const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');\n    const area = line + ' L ' + w + ' ' + h + ' L 0 ' + h + ' Z';\n    return '<svg class=\"stat-spark\" viewBox=\"0 0 ' + w + ' ' + h + '\" preserveAspectRatio=\"none\">' +\n      '<path class=\"area\" d=\"' + area + '\"/>' +\n      '<path class=\"line\" vector-effect=\"non-scaling-stroke\" d=\"' + line + '\"/><\u002Fsvg>';\n  }\n\n  function enhanceContent() {\n    const reduce = reduceMotion();\n    document.querySelectorAll('.stat-card-value:not([data-cu]), .metric-big-value:not([data-cu])').forEach(el => {\n      el.setAttribute('data-cu', '1');\n      if (!reduce) countUp(el);\n    });\n    const stats = document.querySelectorAll('.day-stats .stat-card:not([data-spark])');\n    if (stats.length) {\n      const vals = last7Completed();\n      const svg = sparkSVG(vals);\n      stats.forEach(card => { card.setAttribute('data-spark', '1'); card.insertAdjacentHTML('beforeend', svg); });\n    }\n  }\n\n  // ---- Rail tooltips: mirror item labels into data-tip ----\n  function applyTips() {\n    document.querySelectorAll('.sidebar .nav-item').forEach(n => {\n      const t = n.querySelector('.nav-item-text'); if (t) n.setAttribute('data-tip', t.textContent.trim());\n    });\n    document.querySelectorAll('.sidebar .project-row').forEach(n => {\n      const t = n.querySelector('.project-name'); if (t) n.setAttribute('data-tip', t.textContent.trim());\n    });\n    document.querySelectorAll('.sidebar .tag-row').forEach(n => {\n      const t = n.querySelector('.tag-name'); if (t) n.setAttribute('data-tip', t.textContent.trim());\n    });\n  }\n\n  // ---- Collapsible rail ----\n  window.toggleRail = function () {\n    const app = document.querySelector('.app');\n    const collapsed = app.classList.toggle('rail');\n    try { localStorage.setItem('rh_rail', collapsed ? '1' : '0'); } catch (e) {}\n    const btn = document.querySelector('.rail-toggle');\n    if (btn) btn.textContent = collapsed ? '»' : '«';\n  };\n  try {\n    if (localStorage.getItem('rh_rail') === '1') document.querySelector('.app').classList.add('rail');\n  } catch (e) {}\n\n  // ---- Global light↔dark crossfade ----\n  if (typeof window.toggleTheme === 'function') {\n    const _toggleTheme = window.toggleTheme;\n    window.toggleTheme = function () {\n      const root = document.documentElement;\n      root.classList.add('theme-anim');\n      const r = _toggleTheme.apply(this, arguments);\n      setTimeout(() => root.classList.remove('theme-anim'), 280);\n      return r;\n    };\n  }\n\n  // ---- Observe re-renders ----\n  const content = document.getElementById('content');\n  if (content) {\n    let pendingC = false;\n    new MutationObserver(() => {\n      if (pendingC) return; pendingC = true;\n      requestAnimationFrame(() => { pendingC = false; enhanceContent(); });\n    }).observe(content, { childList: true, subtree: true });\n  }\n  const sidebar = document.querySelector('.sidebar');\n  if (sidebar) {\n    let pendingS = false;\n    new MutationObserver(() => {\n      if (pendingS) return; pendingS = true;\n      requestAnimationFrame(() => { pendingS = false; applyTips(); });\n    }).observe(sidebar, { childList: true, subtree: true });\n  }\n\n  // Initial pass\n  enhanceContent();\n  applyTips();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
