ante', 'Execute imediatamente')}\n      ${renderQuad(q2, 'q2', '🎯 Planejar', 'Não urgente + Importante', 'Bloqueie tempo na agenda')}\n      ${renderQuad(q3, 'q3', '🔄 Delegar', 'Urgente + Não importante', 'Considere repassar ou automatizar')}\n      ${renderQuad(q4, 'q4', '🗑 Eliminar', 'Não urgente + Não importante', 'Questione se precisa existir')}\n    <\u002Fdiv>\n  `;\n}\n\n\n// ============================================================\n// VIEW: METRICS (heatmap, velocity, burndown)\n// ============================================================\nfunction renderMetricsView(container) {\n  // Last 12 weeks heatmap\n  const weeks = 12;\n  const heatmapData = [];\n  const today = new Date(); today.setHours(0,0,0,0);\n  const dayLabels = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];\n  for (let d = 0; d < 7; d++) {\n    const row = [];\n    for (let w = weeks - 1; w >= 0; w--) {\n      const date = new Date(today);\n      date.setDate(date.getDate() - (today.getDay() === 0 ? 6 : today.getDay() - 1) - w * 7 + d);\n      const iso = isoFromDate(date);\n      const count = state.tasks.filter(t => t.completedAt && t.completedAt.slice(0, 10) === iso).length;\n      row.push({ iso, count, date });\n    }\n    heatmapData.push({ label: dayLabels[d], cells: row });\n  }\n  const maxHeat = Math.max(1, ...heatmapData.flatMap(r => r.cells.map(c => c.count)));\n  const heatLevel = c => c === 0 ? '' : c <= maxHeat * 0.25 ? 'l1' : c <= maxHeat * 0.5 ? 'l2' : c <= maxHeat * 0.75 ? 'l3' : 'l4';\n\n  // Velocity per week (last 8)\n  const velocityData = [];\n  for (let w = 7; w >= 0; w--) {\n    const start = new Date(); start.setDate(start.getDate() - w * 7);\n    const weekStart = startOfWeek(start);\n    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6); weekEnd.setHours(23,59,59);\n    const count = state.tasks.filter(t => t.completedAt && new Date(t.completedAt) >= weekStart && new Date(t.completedAt) <= weekEnd).length;\n    velocityData.push({ week: getWeekISO(weekStart), count });\n  }\n\n  // Completion rate trend\n  const monthRates = [];\n  for (let m = 5; m >= 0; m--) {\n    const refDate = new Date(); refDate.setMonth(refDate.getMonth() - m);\n    const monthStart = new Date(refDate.getFullYear(), refDate.getMonth(), 1);\n    const monthEnd = new Date(refDate.getFullYear(), refDate.getMonth() + 1, 0); monthEnd.setHours(23,59,59);\n    const monthTasks = state.tasks.filter(t => t.createdAt && new Date(t.createdAt) >= monthStart && new Date(t.createdAt) <= monthEnd);\n    const monthDone = monthTasks.filter(t => t.status === 'done').length;\n    monthRates.push({ label: monthStart.toLocaleDateString('pt-BR', { month: 'short' }), rate: monthTasks.length ? Math.round(monthDone / monthTasks.length * 100) : 0, total: monthTasks.length });\n  }\n\n  // Computed metrics\n  const totalDone = state.tasks.filter(t => t.status === 'done').length;\n  const totalCreated = state.tasks.length;\n  const completionRate = totalCreated > 0 ? Math.round(totalDone / totalCreated * 100) : 0;\n  const avgHoursPerTask = (() => {\n    const withHours = state.tasks.filter(t => t.status === 'done' && t.hours);\n    return withHours.length > 0 ? (withHours.reduce((s, t) => s + parseFloat(t.hours), 0) / withHours.length).toFixed(1) : '—';\n  })();\n  const totalPomos = state.pomodoroSessions.filter(s => s.completed).length;\n\n  // Trend calculations\n  const thisWeekDone = velocityData[velocityData.length - 1].count;\n  const lastWeekDone = velocityData[velocityData.length - 2]?.count || 0;\n  const trendPct = lastWeekDone > 0 ? Math.round((thisWeekDone - lastWeekDone) / lastWeekDone * 100) : 0;\n\n  container.innerHTML = `\n    <div class=\"day-stats\">\n      <div class=\"metric-big\">\n        <div class=\"metric-big-label\">Taxa de conclusão<\u002Fdiv>\n        <div class=\"metric-big-value\">${completionRate}%<\u002Fdiv>\n        <div class=\"metric-big-trend\">${totalDone}/${totalCreated} tarefas<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric-big\">\n        <div class=\"metric-big-label\">Velocity (sem.)<\u002Fdiv>\n        <div class=\"metric-big-value\">${thisWeekDone}<\u002Fdiv>\n        <div class=\"metric-big-trend ${trendPct >= 0 ? 'up' : 'down'}\">${trendPct >= 0 ? '↑' : '↓'} ${Math.abs(trendPct)}% vs sem. anterior<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric-big\">\n        <div class=\"metric-big-label\">Avg. h/tarefa<\u002Fdiv>\n        <div class=\"metric-big-value\">${avgHoursPerTask}<\u002Fdiv>\n        <div class=\"metric-big-trend\">tarefas com horas registradas<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric-big\">\n        <div class=\"metric-big-label\">Pomodoros<\u002Fdiv>\n        <div class=\"metric-big-value\">${totalPomos}<\u002Fdiv>\n        <div class=\"metric-big-trend\">sessões de foco completas<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card\" style=\"margin-top: 16px;\">\n      <div class=\"card-header\">\n        <div>\n          <div class=\"card-title\">🔥 Heatmap de produtividade<\u002Fdiv>\n          <div class=\"card-sub\">Tarefas concluídas nas últimas ${weeks} semanas<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"heatmap\" style=\"grid-template-columns: 36px repeat(${weeks}, 1fr);\">\n        ${heatmapData.map(row => `\n          <div class=\"heatmap-row\">\n            <div class=\"heatmap-label\">${row.label}<\u002Fdiv>\n            ${row.cells.map(c => `<div class=\"heatmap-cell ${heatLevel(c.count)}\" title=\"${fmtDateBR(c.iso)}: ${c.count} tarefa${c.count !== 1 ? 's' : ''}\"><\u002Fdiv>`).join('')}\n          <\u002Fdiv>\n        `).join('')}\n      <\u002Fdiv>\n      <div class=\"heatmap-legend\">\n        Menos\n        <span class=\"heatmap-legend-cell heatmap-cell\"><\u002Fspan>\n        <span class=\"heatmap-legend-cell heatmap-cell l1\"><\u002Fspan>\n        <span class=\"heatmap-legend-cell heatmap-cell l2\"><\u002Fspan>\n        <span class=\"heatmap-legend-cell heatmap-cell l3\"><\u002Fspan>\n        <span class=\"heatmap-legend-cell heatmap-cell l4\"><\u002Fspan>\n        Mais\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"metrics-grid\" style=\"margin-top: 16px;\">\n      <div class=\"card\">\n        <div class=\"card-header\"><div><div class=\"card-title\">📈 Velocity (8 semanas)<\u002Fdiv><div class=\"card-sub\">Tarefas concluídas por semana<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"chart-container\"><canvas id=\"velocity-chart\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-header\"><div><div class=\"card-title\">📊 Taxa de conclusão mensal<\u002Fdiv><div class=\"card-sub\">Últimos 6 meses<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"chart-container\"><canvas id=\"completion-chart\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"metrics-grid\" style=\"margin-top: 14px;\">\n      <div class=\"card\">\n        <div class=\"card-header\"><div><div class=\"card-title\">🏷 Distribuição por prioridade<\u002Fdiv><div class=\"card-sub\">Tarefas ativas<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"chart-container\"><canvas id=\"priority-chart\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-header\"><div><div class=\"card-title\">🗂 Horas por projeto (30d)<\u002Fdiv><div class=\"card-sub\">Esforço estimado realizado<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"chart-container\"><canvas id=\"proj-effort-chart\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card\" style=\"margin-top: 14px;\">\n      <div class=\"card-header\"><div><div class=\"card-title\">📉 Burndown agregado (projetos ativos)<\u002Fdiv><div class=\"card-sub\">Tarefas restantes ao longo do tempo<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"chart-container lg\"><canvas id=\"burndown-chart\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  `;\n\n  setTimeout(() => { renderMetricsCharts(velocityData, monthRates); }, 50);\n}\n\n// ============================================================\n// VIEW: GOALS\n// ============================================================\nfunction renderGoalsView(container) {\n  const now = new Date();\n  const currentMonthKey = getMonthKey(now);\n  const currentWeekKey = getWeekISO(now);\n\n  state.goals.forEach(g => {\n    if (g.type === 'task-count') {\n      let scope = state.tasks.filter(t => t.status === 'done' && t.completedAt);\n      if (g.period === 'month') scope = scope.filter(t => t.completedAt.slice(0, 7) === currentMonthKey);\n      else if (g.period === 'week') scope = scope.filter(t => getWeekISO(new Date(t.completedAt)) === currentWeekKey);\n      if (g.projectId) scope = scope.filter(t => t.project === g.projectId);\n      g.current = scope.length;\n    } else if (g.type === 'hours') {\n      let scope = state.tasks.filter(t => t.status === 'done' && t.completedAt && t.hours);\n      if (g.period === 'month') scope = scope.filter(t => t.completedAt.slice(0, 7) === currentMonthKey);\n      else if (g.period === 'week') scope = scope.filter(t => getWeekISO(new Date(t.completedAt)) === currentWeekKey);\n      if (g.projectId) scope = scope.filter(t => t.project === g.projectId);\n      g.current = scope.reduce((s, t) => s + parseFloat(t.hours), 0);\n    }\n  });\n\n  const active = state.goals.filter(g => {\n    if (g.period === 'month') return g.monthKey === currentMonthKey;\n    if (g.period === 'week') return g.weekKey === currentWeekKey;\n    return true;\n  });\n  const past = state.goals.filter(g => !active.includes(g));\n\n  const renderCard = g => {\n    const pct = g.target > 0 ? Math.min(100, (g.current / g.target) * 100) : 0;\n    let barClass = pct >= 100 ? 'success' : pct >= 60 ? '' : pct >= 30 ? 'warning' : 'danger';\n    const proj = g.projectId ? state.projects.find(p => p.id === g.projectId) : null;\n    const periodLabel = g.period === 'month' ? `Mês ${g.monthKey}` : g.period === 'week' ? `Semana ${g.weekKey}` : 'Trimestre';\n    return `\n      <div class=\"goal-card\" onclick=\"openGoalModal('${g.id}')\" style=\"cursor: pointer;\">\n        <div class=\"goal-header\">\n          <div>\n            <div class=\"goal-title\">${escapeHtml(g.title)}<\u002Fdiv>\n            <div class=\"goal-sub\">${periodLabel}${proj ? ' · ' + escapeHtml(proj.name) : ''}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align: right;\">\n            <div class=\"goal-progress-num\">${g.current.toFixed(g.current % 1 ? 1 : 0)}<span class=\"goal-progress-target\"> / ${g.target}${g.unit ? ' ' + g.unit : ''}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size: 11px; color: var(--text-muted); font-family: var(--font-mono);\">${Math.round(pct)}%<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"goal-bar\"><div class=\"goal-bar-fill ${barClass}\" style=\"width: ${pct}%;\"><\u002Fdiv><\u002Fdiv>\n        ${g.notes ? `<div style=\"font-size: 12px; color: var(--text-muted); margin-top: 10px;\">${nl2br(g.notes)}<\u002Fdiv>` : ''}\n      <\u002Fdiv>\n    `;\n  };\n\n  container.innerHTML = `\n    <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;\">\n      <div>\n        <h3 style=\"font-size: 15px; font-weight: 600;\">Metas e OKRs<\u002Fh3>\n        <div style=\"font-size: 12px; color: var(--text-muted);\">Defina objetivos claros por período. As métricas com tipos automáticos atualizam sozinhas.<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn-primary\" onclick=\"openGoalModal()\">+ Nova meta<\u002Fbutton>\n    <\u002Fdiv>\n\n    ${active.length === 0 ? `\n      <div class=\"card\">\n        <div class=\"empty-state\">\n          ${svgEmpty('goal')}\n          <div class=\"empty-title\">Sem metas neste período<\u002Fdiv>\n          <div class=\"empty-sub\">Defina um alvo mensurável para acompanhar seu progresso ao longo do período.<\u002Fdiv>\n          <button class=\"btn-primary\" onclick=\"openGoalModal()\">Criar primeira meta<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    ` : `\n      <div class=\"section-header\"><div class=\"section-title\">Ativas <span class=\"section-count\">${active.length}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px;\">\n        ${active.map(renderCard).join('')}\n      <\u002Fdiv>\n    `}\n\n    ${past.length > 0 ? `\n      <div class=\"section-header\" style=\"margin-top: 24px;\"><div class=\"section-title\">Histórico <span class=\"section-count\">${past.length}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px;\">\n        ${past.slice(0, 8).map(renderCard).join('')}\n      <\u002Fdiv>\n    ` : ''}\n  `;\n}\n\n// ============================================================\n// VIEW: REVIEW\n// ============================================================\nfunction renderReviewView(container) {\n  const weekKey = getWeekISO(new Date());\n  const review = state.weeklyReviews[weekKey] || { delivered: '', blocked: '', priorities: '', wins: '', lessons: '' };\n  const start = startOfWeek(new Date());\n  const end = new Date(start); end.setDate(start.getDate() + 6);\n  const weekTasks = state.tasks.filter(t => { if (!t.date) return false; const d = new Date(t.date + 'T00:00:00'); return d >= start && d <= end; });\n  const done = weekTasks.filter(t => t.status === 'done');\n  const blocked = weekTasks.filter(t => t.status === 'blocked');\n  const totalHours = done.reduce((s, t) => s + (parseFloat(t.hours) || 0), 0);\n\n  const pomosThisWeek = state.pomodoroSessions.filter(s => {\n    if (!s.completed || !s.endedAt) return false;\n    const d = new Date(s.endedAt);\n    return d >= start && d <= end && s.mode === 'focus';\n  }).length;\n\n  container.innerHTML = `\n    <div class=\"card\">\n      <div class=\"card-header\">\n        <div><div class=\"card-title\">Revisão da semana ${weekKey}<\u002Fdiv><div class=\"card-sub\">${fmtDateBR(isoFromDate(start))} → ${fmtDateBR(isoFromDate(end))}<\u002Fdiv><\u002Fdiv>\n        <div style=\"display: flex; gap: 6px;\">\n          <button class=\"btn-secondary\" onclick=\"sendSlackDigest('review')\">⚡ Enviar p/ Slack<\u002Fbutton>\n          <button class=\"btn-primary\" onclick=\"copyWeekReview()\">📋 Copiar review<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"day-stats\">\n        <div class=\"stat-card\"><div class=\"stat-card-label\">Concluídas<\u002Fdiv><div class=\"stat-card-value\">${done.length}<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"stat-card-label\">Bloqueadas<\u002Fdiv><div class=\"stat-card-value\" style=\"color:${blocked.length?'var(--danger)':'var(--text)'}\">${blocked.length}<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"stat-card-label\">Horas<\u002Fdiv><div class=\"stat-card-value\">${totalHours.toFixed(1)}h<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"stat-card-label\">Conclusão<\u002Fdiv><div class=\"stat-card-value\">${weekTasks.length?Math.round(done.length/weekTasks.length*100):0}%<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat-card\"><div class=\"stat-card-label\">Pomodoros<\u002Fdiv><div class=\"stat-card-value\">${pomosThisWeek}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"review-section\">\n        <div><label class=\"form-label\">✅ O que entreguei<\u002Flabel><textarea class=\"review-textarea\" id=\"review-delivered\" onblur=\"saveReview()\" placeholder=\"Principais entregas...\">${escapeHtml(review.delivered)}<\u002Ftextarea><\u002Fdiv>\n        <div><label class=\"form-label\">🚧 O que travou<\u002Flabel><textarea class=\"review-textarea\" id=\"review-blocked\" onblur=\"saveReview()\" placeholder=\"Bloqueios, dependências externas...\">${escapeHtml(review.blocked)}<\u002Ftextarea><\u002Fdiv>\n        <div><label class=\"form-label\">🏆 Wins / momentos altos<\u002Flabel><textarea class=\"review-textarea\" id=\"review-wins\" onblur=\"saveReview()\" placeholder=\"Conquistas, breakthroughs...\">${escapeHtml(review.wins || '')}<\u002Ftextarea><\u002Fdiv>\n        <div><label class=\"form-label\">💡 Lições / o que aprendi<\u002Flabel><textarea class=\"review-textarea\" id=\"review-lessons\" onblur=\"saveReview()\" placeholder=\"O que faria diferente?\">${escapeHtml(review.lessons || '')}<\u002Ftextarea><\u002Fdiv>\n        <div style=\"grid-column: span 2;\"><label class=\"form-label\">🎯 Prioridades da próxima semana<\u002Flabel><textarea class=\"review-textarea\" id=\"review-priorities\" onblur=\"saveReview()\" placeholder=\"3-5 prioridades para a próxima semana\">${escapeHtml(review.priorities)}<\u002Ftextarea><\u002Fdiv>\n      <\u002Fdiv>\n      ${done.length ? `<div class=\"section-header\" style=\"margin-top:24px;\"><div class=\"section-title\">📦 Entregas da semana <span class=\"section-count\">${done.length}<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"task-list\">${done.map(t => taskItemHTML(t)).join('')}<\u002Fdiv>` : ''}\n      ${blocked.length ? `<div class=\"section-header\" style=\"margin-top:16px;\"><div class=\"section-title\">🚧 Bloqueios <span class=\"section-count\">${blocked.length}<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"task-list\">${blocked.map(t => taskItemHTML(t)).join('')}<\u002Fdiv>` : ''}\n    <\u002Fdiv>\n  `;\n}\n\n// ============================================================\n// HTML helpers (tasks, projects)\n// ============================================================\nfunction taskItemHTML(t, overdue) {\n  const proj = state.projects.find(p => p.id === t.project);\n  const subtotalSubs = (t.subtasks || []).length;\n  const subDone = (t.subtasks || []).filter(s => s.done).length;\n  const isOverdue = overdue || (t.date && t.date < todayISO() && t.status !== 'done');\n  const isSelected = state.bulkSelection.has(t.id);\n  return `\n    <div class=\"task-item ${t.status === 'done' ? 'done' : ''} ${isOverdue ? 'overdue' : ''} ${isSelected ? 'selected' : ''}\" data-task-id=\"${t.id}\" draggable=\"${!state.bulkMode}\" ondragstart=\"weekDragStart(event, '${t.id}')\">\n      <div class=\"task-bulk ${isSelected ? 'checked' : ''}\" onclick=\"toggleBulkSelect('${t.id}')\"><\u002Fdiv>\n      <div class=\"task-priority ${t.priority}\"><\u002Fdiv>\n      <div class=\"task-checkbox ${t.status === 'done' ? 'checked' : ''}\" onclick=\"event.stopPropagation(); toggleTaskDone('${t.id}')\"><\u002Fdiv>\n      <div class=\"task-content\" onclick=\"openTaskModal('${t.id}')\">\n        <div class=\"task-title\">${escapeHtml(t.title)}${t.recurrence ? `<span class=\"task-recur\">↻ ${recurrenceLabel(t.recurrence)}<\u002Fspan>` : ''}<\u002Fdiv>\n        <div class=\"task-meta\">\n          ${proj ? `<span class=\"task-project-tag\"><span class=\"project-dot\" style=\"background:${proj.color}\"><\u002Fspan>${escapeHtml(proj.name)}<\u002Fspan>` : ''}\n          ${(t.tags || []).slice(0, 4).map(tg => `<span class=\"task-tag-chip\">#${escapeHtml(tg)}<\u002Fspan>`).join('')}\n          ${t.date ? `<span>📅 ${fmtDateBR(t.date)}<\u002Fspan>` : ''}\n          ${t.hours ? `<span>⏱ ${t.hours}h<\u002Fspan>` : ''}\n          ${subtotalSubs > 0 ? `<span class=\"task-subtask-count\">${subDone}/${subtotalSubs}<\u002Fspan>` : ''}\n          ${t.status === 'blocked' ? `<span class=\"task-status-blocked\">🚧 Bloqueada<\u002Fspan>` : ''}\n          ${t.status === 'doing' ? `<span style=\"color:var(--primary);\">▸ Em andamento<\u002Fspan>` : ''}\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"task-actions\">\n        <button class=\"task-action timer-btn\" onclick=\"event.stopPropagation(); startPomodoroForTask('${t.id}')\" title=\"Iniciar pomodoro\">⏱<\u002Fbutton>\n        <button class=\"task-action\" onclick=\"event.stopPropagation(); openTaskModal('${t.id}')\" title=\"Editar\">✎<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction recurrenceLabel(r) {\n  return { 'daily': 'diária', 'weekly': 'semanal', 'biweekly': 'quinzenal', 'monthly': 'mensal', 'monthly-business': 'último dia útil' }[r] || r;\n}\n\nfunction weekTaskHTML(t) {\n  const proj = state.projects.find(p => p.id === t.project);\n  const subs = (t.subtasks || []).length;\n  return `\n    <div class=\"week-task ${t.priority} ${t.status === 'done' ? 'done' : ''}\" draggable=\"true\" ondragstart=\"weekDragStart(event, '${t.id}')\" onclick=\"openTaskModal('${t.id}')\" title=\"${escapeAttr(t.title)}\">\n      ${escapeHtml(t.title)}\n      ${proj || t.hours || subs > 0 ? `<div class=\"week-task-meta\">\n        ${proj ? `<span class=\"project-dot\" style=\"background:${proj.color}; width: 6px; height: 6px;\"><\u002Fspan>` : ''}\n        ${proj ? escapeHtml(proj.name.slice(0, 18)) : ''}\n        ${t.hours ? `· ${t.hours}h` : ''}\n        ${subs > 0 ? `· ${(t.subtasks || []).filter(s=>s.done).length}/${subs}` : ''}\n      <\u002Fdiv>` : ''}\n    <\u002Fdiv>\n  `;\n}\n\nfunction renderProjectCards() {\n  if (!state.projects.length) return '<div class=\"empty-state\">Nenhum projeto ainda<\u002Fdiv>';\n  return state.projects.filter(p => p.status !== 'done').slice(0, 6).map(p => {\n    const projTasks = state.tasks.filter(t => t.project === p.id);\n    const projDone = projTasks.filter(t => t.status === 'done').length;\n    const progress = projTasks.length ? Math.round(projDone / projTasks.length * 100) : 0;\n    const statusClass = { 'on-track': 'status-on-track', 'at-risk': 'status-at-risk', 'blocked': 'status-blocked', 'done': 'status-done' }[p.status];\n    const statusLabel = { 'on-track': 'No prazo', 'at-risk': 'Em risco', 'blocked': 'Bloqueado', 'done': 'Concluído' }[p.status];\n    return `\n      <div class=\"project-card\" onclick=\"openProjectModal('${p.id}')\">\n        <div class=\"project-card-header\">\n          <div class=\"project-card-title\"><span class=\"project-dot\" style=\"background:${p.color}\"><\u002Fspan>${escapeHtml(p.name)}<\u002Fdiv>\n          <span class=\"project-status ${statusClass}\">${statusLabel}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"project-card-meta\">${p.jira ? `<span style=\"margin-right:8px;\">🎫 ${escapeHtml(p.jira)}<\u002Fspan>` : ''}${p.deadline ? `📅 ${fmtDateBR(p.deadline)}` : 'Sem prazo'}<\u002Fdiv>\n        <div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:${progress}%;background:${p.color}\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"project-card-stats\"><span>${projDone}/${projTasks.length} tarefas<\u002Fspan><span class=\"mono\">${progress}%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }).join('');\n}\n\n\n// ============================================================\n// CHARTS\n// ============================================================\nlet chartInstances = {};\nfunction destroyCharts() { Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch (e) {} }); chartInstances = {}; }\n\nconst themeColors = () => {\n  const dark = state.settings.theme === 'dark';\n  return {\n    text: dark ? '#9098A8' : '#5B6168',\n    grid: dark ? 'rgba(255,255,255,0.08)' : 'rgba(11,18,32,0.08)',\n    primary: dark ? '#4D7CFF' : '#002CBE',\n    bright: dark ? '#6B92FF' : '#0038E5'\n  };\n};\n\nfunction chartOpts(showLegend, indexAxis) {\n  const c = themeColors();\n  return {\n    responsive: true, maintainAspectRatio: false,\n    indexAxis: indexAxis || 'x',\n    plugins: {\n      legend: showLegend ? { position: 'bottom', labels: { font: { family: 'Space Grotesk', size: 11 }, color: c.text, padding: 12, boxWidth: 10 } } : { display: false },\n      tooltip: { backgroundColor: state.settings.theme === 'dark' ? '#1A2029' : '#0B1220', padding: 10, titleFont: { family: 'Space Grotesk', size: 12 }, bodyFont: { family: 'Space Grotesk', size: 12 }, cornerRadius: 6 }\n    },\n    scales: showLegend ? {} : {\n      y: { beginAtZero: true, ticks: { font: { family: 'JetBrains Mono', size: 10 }, color: c.text }, grid: { color: c.grid } },\n      x: { ticks: { font: { family: 'Space Grotesk', size: 10 }, color: c.text }, grid: { display: false } }\n    }\n  };\n}\n\nfunction renderWeekCharts() {\n  destroyCharts();\n  const now = new Date();\n  const start = startOfWeek(now);\n  const end = new Date(start); end.setDate(start.getDate() + 6);\n  const weekTasks = state.tasks.filter(t => { if (!t.date) return false; const d = new Date(t.date + 'T00:00:00'); return d >= start && d <= end; });\n\n  // Hours by project\n  const ctx1 = document.getElementById('week-load-chart');\n  if (ctx1) {\n    const byProj = {};\n    weekTasks.forEach(t => {\n      const proj = state.projects.find(p => p.id === t.project);\n      const projName = proj?.name || 'Sem projeto';\n      const color = proj?.color || '#94A3B8';\n      if (!byProj[projName]) byProj[projName] = { hours: 0, color };\n      byProj[projName].hours += parseFloat(t.hours) || 0;\n    });\n    const labels = Object.keys(byProj);\n    chartInstances.weekLoad = new Chart(ctx1, {\n      type: 'bar',\n      data: { labels, datasets: [{ data: labels.map(l => byProj[l].hours), backgroundColor: labels.map(l => byProj[l].color), borderRadius: 4 }] },\n      options: chartOpts(false)\n    });\n  }\n\n  // Status\n  const ctx2 = document.getElementById('week-status-chart');\n  if (ctx2) {\n    const sc = { todo: 0, doing: 0, blocked: 0, done: 0 };\n    weekTasks.forEach(t => { sc[t.status] = (sc[t.status] || 0) + 1; });\n    chartInstances.weekStatus = new Chart(ctx2, {\n      type: 'doughnut',\n      data: { labels: ['A fazer','Em andamento','Bloqueadas','Concluídas'], datasets: [{ data: [sc.todo, sc.doing, sc.blocked, sc.done], backgroundColor: ['#C9C7B8','#002CBE','#C92424','#00875F'], borderWidth: 0 }] },\n      options: { ...chartOpts(true), cutout: '60%' }\n    });\n  }\n\n  // Daily load\n  const ctx3 = document.getElementById('week-daily-chart');\n  if (ctx3) {\n    const days = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];\n    const data = [];\n    for (let i = 0; i < 7; i++) {\n      const d = new Date(start); d.setDate(start.getDate() + i);\n      const iso = isoFromDate(d);\n      const hours = weekTasks.filter(t => t.date === iso).reduce((s, t) => s + (parseFloat(t.hours) || 0), 0);\n      data.push(hours);\n    }\n    const c = themeColors();\n    chartInstances.weekDaily = new Chart(ctx3, {\n      type: 'bar',\n      data: {\n        labels: days,\n        datasets: [\n          { label: 'Horas estimadas', data, backgroundColor: c.primary, borderRadius: 4 },\n          { label: 'Meta', type: 'line', data: Array(7).fill(state.settings.dailyHours), borderColor: c.bright, borderDash: [4, 4], borderWidth: 1.5, pointRadius: 0, fill: false }\n        ]\n      },\n      options: { ...chartOpts(true) }\n    });\n  }\n}\n\nfunction renderMonthCharts() {\n  destroyCharts();\n  const now = new Date();\n  const offset = state.settings.monthOffset || 0;\n  const refDate = new Date(now.getFullYear(), now.getMonth() + offset, 1);\n  const monthTasks = state.tasks.filter(t => { if (!t.date) return false; const d = new Date(t.date + 'T00:00:00'); return d.getMonth() === refDate.getMonth() && d.getFullYear() === refDate.getFullYear(); });\n\n  const ctx = document.getElementById('month-chart');\n  if (ctx) {\n    const byProj = {};\n    monthTasks.forEach(t => {\n      const proj = state.projects.find(p => p.id === t.project);\n      const name = proj?.name || 'Sem projeto';\n      const color = proj?.color || '#94A3B8';\n      if (!byProj[name]) byProj[name] = { count: 0, color };\n      byProj[name].count++;\n    });\n    const labels = Object.keys(byProj);\n    if (labels.length) {\n      chartInstances.month = new Chart(ctx, {\n        type: 'doughnut',\n        data: { labels, datasets: [{ data: labels.map(l => byProj[l].count), backgroundColor: labels.map(l => byProj[l].color), borderWidth: 0 }] },\n        options: { ...chartOpts(true), cutout: '55%' }\n      });\n    } else {\n      ctx.parentElement.innerHTML = '<div class=\"empty-state\" style=\"padding: 20px;\">Sem tarefas no mês<\u002Fdiv>';\n    }\n  }\n\n  const ctx2 = document.getElementById('month-progress-chart');\n  if (ctx2) {\n    const activeProjects = state.projects.filter(p => p.status !== 'done').slice(0, 6);\n    const labels = activeProjects.map(p => p.name);\n    const doneData = activeProjects.map(p => state.tasks.filter(t => t.project === p.id && t.status === 'done').length);\n    const pendingData = activeProjects.map(p => state.tasks.filter(t => t.project === p.id && t.status !== 'done').length);\n    if (labels.length) {\n      chartInstances.monthProgress = new Chart(ctx2, {\n        type: 'bar',\n        data: {\n          labels,\n          datasets: [\n            { label: 'Concluídas', data: doneData, backgroundColor: '#00875F', borderRadius: 3 },\n            { label: 'Pendentes', data: pendingData, backgroundColor: '#C9C7B8', borderRadius: 3 }\n          ]\n        },\n        options: { ...chartOpts(true, 'y'), scales: { ...chartOpts(false, 'y').scales, x: { stacked: true, beginAtZero: true, ticks: { font: { family: 'JetBrains Mono', size: 10 }, color: themeColors().text }, grid: { color: themeColors().grid } }, y: { stacked: true, ticks: { font: { family: 'Space Grotesk', size: 10 }, color: themeColors().text }, grid: { display: false } } } }\n      });\n    }\n  }\n}\n\nfunction renderMetricsCharts(velocityData, monthRates) {\n  destroyCharts();\n  const c = themeColors();\n\n  // Velocity\n  const ctxV = document.getElementById('velocity-chart');\n  if (ctxV) {\n    chartInstances.vel = new Chart(ctxV, {\n      type: 'line',\n      data: {\n        labels: velocityData.map(v => v.week.split('-W')[1] ? 'S' + v.week.split('-W')[1] : v.week),\n        datasets: [{ label: 'Tarefas concluídas', data: velocityData.map(v => v.count), borderColor: c.primary, backgroundColor: c.primary + '22', borderWidth: 2, tension: 0.4, pointRadius: 4, pointBackgroundColor: c.primary, fill: true }]\n      },\n      options: chartOpts(false)\n    });\n  }\n\n  // Completion rate\n  const ctxC = document.getElementById('completion-chart');\n  if (ctxC) {\n    chartInstances.comp = new Chart(ctxC, {\n      type: 'bar',\n      data: {\n        labels: monthRates.map(m => m.label),\n        datasets: [{ label: 'Taxa de conclusão (%)', data: monthRates.map(m => m.rate), backgroundColor: monthRates.map(m => m.rate >= 80 ? '#00875F' : m.rate >= 50 ? '#C97500' : '#C92424'), borderRadius: 4 }]\n      },\n      options: { ...chartOpts(false), scales: { y: { beginAtZero: true, max: 100, ticks: { font: { family: 'JetBrains Mono', size: 10 }, color: c.text, callback: v => v + '%' }, grid: { color: c.grid } }, x: { ticks: { font: { family: 'Space Grotesk', size: 10 }, color: c.text }, grid: { display: false } } } }\n    });\n  }\n\n  // Priority distribution\n  const ctxP = document.getElementById('priority-chart');\n  if (ctxP) {\n    const counts = { p1: 0, p2: 0, p3: 0, p4: 0 };\n    state.tasks.filter(t => t.status !== 'done').forEach(t => counts[t.priority] = (counts[t.priority] || 0) + 1);\n    chartInstances.prio = new Chart(ctxP, {\n      type: 'polarArea',\n      data: {\n        labels: ['P1 · Crítica', 'P2 · Importante', 'P3 · Normal', 'P4 · Baixa'],\n        datasets: [{ data: [counts.p1, counts.p2, counts.p3, counts.p4], backgroundColor: ['#C92424CC', '#C97500CC', '#94978ACC', '#5B6168CC'], borderWidth: 0 }]\n      },\n      options: { ...chartOpts(true), scales: { r: { ticks: { display: false }, grid: { color: c.grid } } } }\n    });\n  }\n\n  // Project effort 30d\n  const ctxE = document.getElementById('proj-effort-chart');\n  if (ctxE) {\n    const thirtyAgo = new Date(); thirtyAgo.setDate(thirtyAgo.getDate() - 30);\n    const byProj = {};\n    state.tasks.filter(t => t.status === 'done' && t.completedAt && new Date(t.completedAt) >= thirtyAgo).forEach(t => {\n      const proj = state.projects.find(p => p.id === t.project);\n      const name = proj?.name || 'Sem projeto';\n      const color = proj?.color || '#94A3B8';\n      if (!byProj[name]) byProj[name] = { hours: 0, color };\n      byProj[name].hours += parseFloat(t.hours) || 0;\n    });\n    const labels = Object.keys(byProj);\n    if (labels.length) {\n      chartInstances.effort = new Chart(ctxE, {\n        type: 'bar',\n        data: { labels, datasets: [{ data: labels.map(l => byProj[l].hours), backgroundColor: labels.map(l => byProj[l].color), borderRadius: 4 }] },\n        options: chartOpts(false, 'y')\n      });\n    } else {\n      ctxE.parentElement.innerHTML = '<div class=\"empty-state\">Sem dados de horas nos últimos 30 dias<\u002Fdiv>';\n    }\n  }\n\n  // Burndown\n  const ctxB = document.getElementById('burndown-chart');\n  if (ctxB) {\n    const days = 30;\n    const labels = [];\n    const remaining = [];\n    for (let i = days; i >= 0; i--) {\n      const d = new Date(); d.setDate(d.getDate() - i); d.setHours(23, 59, 59);\n      labels.push(d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }));\n      const activeProjects = state.projects.filter(p => p.status !== 'done').map(p => p.id);\n      const total = state.tasks.filter(t => activeProjects.includes(t.project) && t.createdAt && new Date(t.createdAt) <= d).length;\n      const done = state.tasks.filter(t => activeProjects.includes(t.project) && t.completedAt && new Date(t.completedAt) <= d).length;\n      remaining.push(total - done);\n    }\n    chartInstances.burndown = new Chart(ctxB, {\n      type: 'line',\n      data: { labels, datasets: [{ label: 'Tarefas restantes', data: remaining, borderColor: c.primary, backgroundColor: c.primary + '22', borderWidth: 2, tension: 0.4, pointRadius: 0, fill: true }] },\n      options: chartOpts(false)\n    });\n  }\n}\n\n// ============================================================\n// TASK CRUD with subtasks, tags, recurrence\n// ============================================================\nfunction openTaskModal(taskId, prefillDate) {\n  state.editingTaskId = taskId || null;\n  state.draftSubtasks = [];\n  state.draftTags = [];\n\n  const projectSelect = document.getElementById('task-project');\n  projectSelect.innerHTML = '<option value=\"\">— Sem projeto —<\u002Foption>' + state.projects.map(p => `<option value=\"${p.id}\">${escapeHtml(p.name)}<\u002Foption>`).join('');\n\n  const title = document.getElementById('task-modal-title');\n  const deleteBtn = document.getElementById('task-delete-btn');\n  const footerInfo = document.getElementById('task-footer-info');\n  const timeLogGroup = document.getElementById('time-log-group');\n\n  if (taskId) {\n    const t = state.tasks.find(x => x.id === taskId);\n    if (!t) return;\n    title.textContent = 'Editar tarefa';\n    document.getElementById('task-title').value = t.title;\n    document.getElementById('task-project').value = t.project || '';\n    document.getElementById('task-date').value = t.date || '';\n    document.getElementById('task-priority').value = t.priority;\n    document.getElementById('task-importance').value = t.importance || 'med';\n    document.getElementById('task-status').value = t.status;\n    document.getElementById('task-hours').value = t.hours || '';\n    document.getElementById('task-recurrence').value = t.recurrence || '';\n    document.getElementById('task-notes').value = t.notes || '';\n    state.draftSubtasks = (t.subtasks || []).map(s => ({ ...s }));\n    state.draftTags = [...(t.tags || [])];\n    deleteBtn.style.display = 'inline-block';\n    footerInfo.textContent = `Criada em ${fmtDateBR((t.createdAt || '').slice(0, 10))} · ${t.id}`;\n    if ((t.timeLogs || []).length > 0) {\n      timeLogGroup.style.display = 'block';\n      const totalMins = (t.timeLogs || []).reduce((s, l) => s + (l.minutes || 0), 0);\n      document.getElementById('time-log-display').innerHTML = `${(t.timeLogs || []).length} sessão(ões) · <strong>${Math.floor(totalMins/60)}h ${totalMins % 60}m<\u002Fstrong> registrados`;\n    } else {\n      timeLogGroup.style.display = 'none';\n    }\n  } else {\n    title.textContent = 'Nova tarefa';\n    document.getElementById('task-title').value = '';\n    document.getElementById('task-project').value = state.selectedProject || '';\n    document.getElementById('task-date').value = prefillDate || todayISO();\n    document.getElementById('task-priority').value = 'p2';\n    document.getElementById('task-importance').value = 'med';\n    document.getElementById('task-status').value = 'todo';\n    document.getElementById('task-hours').value = '';\n    document.getElementById('task-recurrence').value = '';\n    document.getElementById('task-notes').value = '';\n    state.draftSubtasks = [];\n    state.draftTags = state.selectedTag ? [state.selectedTag] : [];\n    deleteBtn.style.display = 'none';\n    footerInfo.textContent = '';\n    timeLogGroup.style.display = 'none';\n  }\n  renderSubtasksInModal();\n  renderTagsInModal();\n  document.getElementById('task-modal').classList.add('open');\n  setTimeout(() => document.getElementById('task-title').focus(), 100);\n}\n\nfunction renderSubtasksInModal() {\n  const list = document.getElementById('subtask-list');\n  const progress = document.getElementById('subtask-progress');\n  if (state.draftSubtasks.length === 0) {\n    list.innerHTML = '';\n    progress.textContent = '';\n  } else {\n    const done = state.draftSubtasks.filter(s => s.done).length;\n    progress.textContent = `${done}/${state.draftSubtasks.length}`;\n    list.innerHTML = state.draftSubtasks.map((s, i) => `\n      <div class=\"subtask-item\">\n        <div class=\"subtask-check ${s.done ? 'checked' : ''}\" onclick=\"toggleDraftSubtask(${i})\"><\u002Fdiv>\n        <div class=\"subtask-text ${s.done ? 'done' : ''}\">${escapeHtml(s.title)}<\u002Fdiv>\n        <button class=\"subtask-remove\" onclick=\"removeDraftSubtask(${i})\" title=\"Remover\">×<\u002Fbutton>\n      <\u002Fdiv>\n    `).join('');\n  }\n}\n\nfunction renderTagsInModal() {\n  const wrap = document.getElementById('task-tags-wrap');\n  const input = document.getElementById('task-tags-input');\n  Array.from(wrap.querySelectorAll('.tag-chip-input')).forEach(c => c.remove());\n  state.draftTags.forEach((tg, i) => {\n    const chip = document.createElement('span');\n    chip.className = 'tag-chip-input';\n    chip.innerHTML = `#${escapeHtml(tg)} <button onclick=\"removeDraftTag(${i})\">×<\u002Fbutton>`;\n    wrap.insertBefore(chip, input);\n  });\n}\n\nfunction addSubtask() {\n  const input = document.getElementById('subtask-input');\n  const v = input.value.trim();\n  if (!v) return;\n  state.draftSubtasks.push({ id: uid('s'), title: v, done: false });\n  input.value = '';\n  renderSubtasksInModal();\n  input.focus();\n}\nfunction toggleDraftSubtask(i) { state.draftSubtasks[i].done = !state.draftSubtasks[i].done; renderSubtasksInModal(); }\nfunction removeDraftSubtask(i) { state.draftSubtasks.splice(i, 1); renderSubtasksInModal(); }\nfunction removeDraftTag(i) { state.draftTags.splice(i, 1); renderTagsInModal(); }\n\nfunction handleTagInput(e) {\n  if (e.key === 'Enter' || e.key === ',') {\n    e.preventDefault();\n    const input = e.target;\n    const v = input.value.trim().replace(/^#/, '').replace(/\\s+/g, '-').toLowerCase();\n    if (v && !state.draftTags.includes(v)) {\n      state.draftTags.push(v);\n      renderTagsInModal();\n    }\n    input.value = '';\n  } else if (e.key === 'Backspace' && !e.target.value && state.draftTags.length > 0) {\n    state.draftTags.pop();\n    renderTagsInModal();\n  }\n}\n\nfunction closeTaskModal() { document.getElementById('task-modal').classList.remove('open'); state.editingTaskId = null; }\n\nfunction saveTask() {\n  const title = document.getElementById('task-title').value.trim();\n  if (!title) { toast('Título obrigatório', 'danger'); return; }\n  const data = {\n    title,\n    project: document.getElementById('task-project').value || null,\n    date: document.getElementById('task-date').value || null,\n    priority: document.getElementById('task-priority').value,\n    importance: document.getElementById('task-importance').value,\n    status: document.getElementById('task-status').value,\n    hours: document.getElementById('task-hours').value || null,\n    recurrence: document.getElementById('task-recurrence').value || null,\n    notes: document.getElementById('task-notes').value || '',\n    subtasks: state.draftSubtasks,\n    tags: state.draftTags\n  };\n\n  if (state.editingTaskId) {\n    const t = state.tasks.find(x => x.id === state.editingTaskId);\n    const wasDone = t.status === 'done';\n    Object.assign(t, data);\n    if (data.status === 'done' && !wasDone) {\n      t.completedAt = new Date().toISOString();\n      logActivity('task', t.id, 'completed', t.title);\n      if (t.recurrence) spawnRecurringTask(t);\n    }\n    if (data.status !== 'done') delete t.completedAt;\n    logActivity('task', t.id, 'updated', t.title);\n  } else {\n    const newTask = { id: uid('t'), ...data, timeLogs: [], createdAt: new Date().toISOString() };\n    if (data.status === 'done') {\n      newTask.completedAt = new Date().toISOString();\n      if (data.recurrence) spawnRecurringTask(newTask);\n    }\n    state.tasks.push(newTask);\n    logActivity('task', newTask.id, 'created', newTask.title);\n  }\n  saveState(); closeTaskModal(); render(); toast('Tarefa salva', 'success');\n}\n\nfunction deleteCurrentTask() {\n  if (!state.editingTaskId) return;\n  if (!confirm('Excluir esta tarefa?')) return;\n  const t = state.tasks.find(x => x.id === state.editingTaskId);\n  state.tasks = state.tasks.filter(t => t.id !== state.editingTaskId);\n  logActivity('task', state.editingTaskId, 'deleted', t?.title || '');\n  saveState(); closeTaskModal(); render(); toast('Tarefa excluída');\n}\n\nfunction toggleTaskDone(id) {\n  const t = state.tasks.find(x => x.id === id);\n  if (!t) return;\n  if (t.status === 'done') { t.status = 'todo'; delete t.completedAt; logActivity('task', t.id, 'reopened', t.title); }\n  else {\n    t.status = 'done';\n    t.completedAt = new Date().toISOString();\n    logActivity('task', t.id, 'completed', t.title);\n    if (t.recurrence) spawnRecurringTask(t);\n  }\n  saveState(); render();\n}\n\nfunction parseQuickAddSyntax(raw) {\n  let text = raw;\n  const tags = [];\n  let priority = 'p2';\n  let project = state.selectedProject || null;\n\n  const tagMatches = text.match(/#(\\w[\\w-]*)/g) || [];\n  tagMatches.forEach(m => { tags.push(m.slice(1).toLowerCase()); text = text.replace(m, ''); });\n\n  const prioMatch = text.match(/!p([1-4])/i);\n  if (prioMatch) { priority = 'p' + prioMatch[1]; text = text.replace(prioMatch[0], ''); }\n\n  const projMatch = text.match(/@(\\S+)/);\n  if (projMatch) {\n    const projName = projMatch[1].toLowerCase();\n    const proj = state.projects.find(p => p.name.toLowerCase().includes(projName) || (p.jira || '').toLowerCase() === projName);\n    if (proj) project = proj.id;\n    text = text.replace(projMatch[0], '');\n  }\n\n  return { title: text.replace(/\\s+/g, ' ').trim(), tags, priority, project };\n}\n\nfunction quickAdd() {\n  const input = document.getElementById('quick-add-input');\n  const raw = input.value.trim();\n  if (!raw) return;\n  const parsed = parseQuickAddSyntax(raw);\n  if (!parsed.title) return;\n  const newTask = { id: uid('t'), title: parsed.title, project: parsed.project, date: todayISO(), priority: parsed.priority, importance: 'med', status: 'todo', notes: '', tags: parsed.tags, subtasks: [], timeLogs: [], createdAt: new Date().toISOString() };\n  state.tasks.push(newTask);\n  logActivity('task', newTask.id, 'quick-added', newTask.title);\n  input.value = '';\n  saveState(); render();\n  toast('Tarefa adicionada', 'success');\n}\n\n// ============================================================\n// PROJECT CRUD\n// ============================================================\nfunction openProjectModal(projectId) {\n  state.editingProjectId = projectId || null;\n  const title = document.getElementById('project-modal-title');\n  const deleteBtn = document.getElementById('project-delete-btn');\n  if (projectId) {\n    const p = state.projects.find(x => x.id === projectId);\n    if (!p) return;\n    title.textContent = 'Editar projeto';\n    document.getElementById('project-name').value = p.name;\n    document.getElementById('project-area').value = p.area;\n    document.getElementById('project-status').value = p.status;\n    document.getElementById('project-deadline').value = p.deadline || '';\n    document.getElementById('project-color').value = p.color;\n    document.getElementById('project-jira').value = p.jira || '';\n    document.getElementById('project-description').value = p.description || '';\n    deleteBtn.style.display = 'inline-block';\n  } else {\n    title.textContent = 'Novo projeto';\n    document.getElementById('project-name').value = '';\n    document.getElementById('project-area').value = 'reporting';\n    document.getElementById('project-status').value = 'on-track';\n    document.getElementById('project-deadline').value = '';\n    document.getElementById('project-color').value = '#002CBE';\n    document.getElementById('project-jira').value = '';\n    document.getElementById('project-description').value = '';\n    deleteBtn.style.display = 'none';\n  }\n  document.getElementById('project-modal').classList.add('open');\n  setTimeout(() => document.getElementById('project-name').focus(), 100);\n}\nfunction closeProjectModal() { document.getElementById('project-modal').classList.remove('open'); state.editingProjectId = null; }\n\nfunction saveProject() {\n  const name = document.getElementById('project-name').value.trim();\n  if (!name) { toast('Nome obrigatório', 'danger'); return; }\n  const data = {\n    name,\n    area: document.getElementById('project-area').value,\n    status: document.getElementById('project-status').value,\n    deadline: document.getElementById('project-deadline').value || '',\n    color: document.getElementById('project-color').value,\n    jira: document.getElementById('project-jira').value || '',\n    description: document.getElementById('project-description').value || ''\n  };\n  if (state.editingProjectId) { const p = state.projects.find(x => x.id === state.editingProjectId); Object.assign(p, data); logActivity('project', p.id, 'updated', p.name); }\n  else { const p = { id: uid('p'), ...data }; state.projects.push(p); logActivity('project', p.id, 'created', p.name); }\n  saveState(); closeProjectModal(); render(); toast('Projeto salvo', 'success');\n}\n\nfunction deleteCurrentProject() {\n  if (!state.editingProjectId) return;\n  const hasTasks = state.tasks.some(t => t.project === state.editingProjectId);\n  if (hasTasks && !confirm('Existem tarefas vinculadas. Excluir mesmo assim? (As tarefas ficarão sem projeto)')) return;\n  state.tasks.forEach(t => { if (t.project === state.editingProjectId) t.project = null; });\n  state.projects = state.projects.filter(p => p.id !== state.editingProjectId);\n  if (state.selectedProject === state.editingProjectId) state.selectedProject = null;\n  saveState(); closeProjectModal(); render(); toast('Projeto excluído');\n}\n\n// ============================================================\n// GOAL CRUD\n// ============================================================\nfunction openGoalModal(goalId) {\n  state.editingGoalId = goalId || null;\n  const projectSelect = document.getElementById('goal-project');\n  projectSelect.innerHTML = '<option value=\"\">— Qualquer projeto —<\u002Foption>' + state.projects.map(p => `<option value=\"${p.id}\">${escapeHtml(p.name)}<\u002Foption>`).join('');\n  const deleteBtn = document.getElementById('goal-delete-btn');\n  const title = document.getElementById('goal-modal-title');\n  if (goalId) {\n    const g = state.goals.find(x => x.id === goalId);\n    if (!g) return;\n    title.textContent = 'Editar meta';\n    document.getElementById('goal-title').value = g.title;\n    document.getElementById('goal-type').value = g.type;\n    document.getElementById('goal-target').value = g.target;\n    document.getElementById('goal-unit').value = g.unit || '';\n    document.getElementById('goal-period').value = g.period;\n    document.getElementById('goal-project').value = g.projectId || '';\n    document.getElementById('goal-current').value = g.current;\n    document.getElementById('goal-notes').value = g.notes || '';\n    deleteBtn.style.display = 'inline-block';\n  } else {\n    title.textContent = 'Nova meta';\n    document.getElementById('goal-title').value = '';\n    document.getElementById('goal-type').value = 'task-count';\n    document.getElementById('goal-target').value = '';\n    document.getElementById('goal-unit').value = 'tarefas';\n    document.getElementById('goal-period').value = 'month';\n    document.getElementById('goal-project').value = '';\n    document.getElementById('goal-current').value = '0';\n    document.getElementById('goal-notes').value = '';\n    deleteBtn.style.display = 'none';\n  }\n  document.getElementById('goal-modal').classList.add('open');\n  setTimeout(() => document.getElementById('goal-title').focus(), 100);\n}\nfunction closeGoalModal() { document.getElementById('goal-modal').classList.remove('open'); state.editingGoalId = null; }\n\nfunction saveGoal() {\n  const title = document.getElementById('goal-title').value.trim();\n  if (!title) { toast('Título obrigatório', 'danger'); return; }\n  const now = new Date();\n  const data = {\n    title,\n    type: document.getElementById('goal-type').value,\n    target: parseFloat(document.getElementById('goal-target').value) || 0,\n    current: parseFloat(document.getElementById('goal-current').value) || 0,\n    unit: document.getElementById('goal-unit').value || '',\n    period: document.getElementById('goal-period').value,\n    projectId: document.getElementById('goal-project').value || null,\n    notes: document.getElementById('goal-notes').value || '',\n    monthKey: getMonthKey(now),\n    weekKey: getWeekISO(now)\n  };\n  if (state.editingGoalId) { const g = state.goals.find(x => x.id === state.editingGoalId); Object.assign(g, data); logActivity('goal', g.id, 'updated', g.title); }\n  else { const g = { id: uid('g'), ...data, createdAt: now.toISOString() }; state.goals.push(g); logActivity('goal', g.id, 'created', g.title); }\n  saveState(); closeGoalModal(); render(); toast('Meta salva', 'success');\n}\n\nfunction deleteCurrentGoal() {\n  if (!state.editingGoalId) return;\n  if (!confirm('Excluir esta meta?')) return;\n  state.goals = state.goals.filter(g => g.id !== state.editingGoalId);\n  saveState(); closeGoalModal(); render(); toast('Meta excluída');\n}\n\n\n// ============================================================\n// DRAG & DROP (week / month)\n// ============================================================\nfunction weekDragStart(e, taskId) {\n  e.dataTransfer.setData('text/task-id', taskId);\n  e.dataTransfer.effectAllowed = 'move';\n  e.target.classList.add('dragging');\n  setTimeout(() => e.target.classList.remove('dragging'), 0);\n}\nfunction weekDragOver(e, el) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; el.classList.add('drag-over'); }\nfunction weekDrop(e, newDate, el) {\n  e.preventDefault();\n  el.classList.remove('drag-over');\n  const taskId = e.dataTransfer.getData('text/task-id');\n  if (!taskId) return;\n  const t = state.tasks.find(x => x.id === taskId);\n  if (!t || t.date === newDate) return;\n  t.date = newDate;\n  logActivity('task', t.id, 'rescheduled', `→ ${fmtDateBR(newDate)}`);\n  saveState(); render();\n  toast(`Movido para ${fmtDateBR(newDate)}`, 'success');\n}\n\n// ============================================================\n// BULK MODE\n// ============================================================\nfunction toggleBulkMode() {\n  state.bulkMode = !state.bulkMode;\n  state.bulkSelection = new Set();\n  document.getElementById('bulk-btn').classList.toggle('active', state.bulkMode);\n  render();\n}\nfunction toggleBulkSelect(id) {\n  if (state.bulkSelection.has(id)) state.bulkSelection.delete(id);\n  else state.bulkSelection.add(id);\n  render();\n}\nfunction bulkSetStatus(status) {\n  if (state.bulkSelection.size === 0) return toast('Nenhuma tarefa selecionada', 'danger');\n  const ids = [...state.bulkSelection];\n  ids.forEach(id => {\n    const t = state.tasks.find(x => x.id === id);\n    if (!t) return;\n    const wasDone = t.status === 'done';\n    t.status = status;\n    if (status === 'done' && !wasDone) {\n      t.completedAt = new Date().toISOString();\n      if (t.recurrence) spawnRecurringTask(t);\n    }\n    if (status !== 'done') delete t.completedAt;\n  });\n  logActivity('bulk', null, 'status-changed', `${ids.length} → ${status}`);\n  state.bulkSelection = new Set();\n  state.bulkMode = false;\n  saveState(); render();\n  toast(`${ids.length} tarefa(s) atualizada(s)`, 'success');\n}\nfunction bulkMoveDate(when) {\n  if (state.bulkSelection.size === 0) return toast('Nenhuma tarefa selecionada', 'danger');\n  const d = new Date();\n  if (when === 'tomorrow') d.setDate(d.getDate() + 1);\n  else if (when === 'week') d.setDate(d.getDate() + 7);\n  const iso = isoFromDate(d);\n  const ids = [...state.bulkSelection];\n  ids.forEach(id => { const t = state.tasks.find(x => x.id === id); if (t) t.date = iso; });\n  logActivity('bulk', null, 'moved', `${ids.length} → ${fmtDateBR(iso)}`);\n  state.bulkSelection = new Set();\n  state.bulkMode = false;\n  saveState(); render();\n  toast(`${ids.length} tarefa(s) movida(s)`, 'success');\n}\nfunction bulkDelete() {\n  if (state.bulkSelection.size === 0) return toast('Nenhuma tarefa selecionada', 'danger');\n  if (!confirm(`Excluir ${state.bulkSelection.size} tarefa(s)?`)) return;\n  const ids = [...state.bulkSelection];\n  state.tasks = state.tasks.filter(t => !ids.includes(t.id));\n  logActivity('bulk', null, 'deleted', `${ids.length} tarefas`);\n  state.bulkSelection = new Set();\n  state.bulkMode = false;\n  saveState(); render();\n  toast(`${ids.length} tarefa(s) excluída(s)`);\n}\n\n// ============================================================\n// POMODORO\n// ============================================================\nconst pomo = {\n  mode: 'focus',\n  remaining: 25 * 60,\n  running: false,\n  taskId: null,\n  interval: null,\n  sessionsCompleted: 0,\n  sessionStarted: null\n};\n\nfunction openPomodoro() {\n  initPomoFromSettings();\n  document.getElementById('pomo-widget').classList.add('open');\n  updatePomoDisplay();\n}\nfunction closePomodoro() { document.getElementById('pomo-widget').classList.remove('open'); }\n\nfunction initPomoFromSettings() {\n  if (!pomo.running) {\n    pomo.remaining = (pomo.mode === 'focus' ? state.settings.pomoFocus : pomo.mode === 'break' ? state.settings.pomoBreak : state.settings.pomoLong) * 60;\n  }\n}\n\nfunction togglePomodoro() {\n  if (pomo.running) pausePomodoro();\n  else startPomodoro();\n}\nfunction startPomodoro() {\n  pomo.running = true;\n  pomo.sessionStarted = pomo.sessionStarted || new Date().toISOString();\n  document.getElementById('pomo-start-btn').textContent = 'Pausar';\n  document.getElementById('pomo-start-btn').classList.remove('primary');\n  if (pomo.interval) clearInterval(pomo.interval);\n  pomo.interval = setInterval(tickPomodoro, 1000);\n  updatePomoMini();\n}\nfunction pausePomodoro() {\n  pomo.running = false;\n  if (pomo.interval) clearInterval(pomo.interval);\n  document.getElementById('pomo-start-btn').textContent = 'Continuar';\n  document.getElementById('pomo-start-btn').classList.add('primary');\n  updatePomoMini();\n}\nfunction resetPomodoro() {\n  pomo.running = false;\n  if (pomo.interval) clearInterval(pomo.interval);\n  pomo.sessionStarted = null;\n  initPomoFromSettings();\n  document.getElementById('pomo-start-btn').textContent = 'Iniciar';\n  document.getElementById('pomo-start-btn').classList.add('primary');\n  updatePomoDisplay();\n  updatePomoMini();\n}\nfunction skipPomodoro() { completePomodoroSession(true); }\n\nfunction tickPomodoro() {\n  pomo.remaining--;\n  updatePomoDisplay();\n  if (pomo.remaining <= 0) completePomodoroSession(false);\n}\n\nfunction completePomodoroSession(skipped) {\n  if (pomo.interval) clearInterval(pomo.interval);\n  pomo.running = false;\n\n  if (pomo.mode === 'focus' && !skipped) {\n    state.pomodoroSessions.push({\n      taskId: pomo.taskId,\n      startedAt: pomo.sessionStarted,\n      endedAt: new Date().toISOString(),\n      duration: state.settings.pomoFocus,\n      mode: 'focus',\n      completed: true\n    });\n    if (pomo.taskId) {\n      const t = state.tasks.find(x => x.id === pomo.taskId);\n      if (t) {\n        t.timeLogs = t.timeLogs || [];\n        t.timeLogs.push({ minutes: state.settings.pomoFocus, at: new Date().toISOString(), source: 'pomodoro' });\n      }\n    }\n    pomo.sessionsCompleted++;\n    tryNotify('⏱ Pomodoro completo!', 'Hora da pausa. Bom trabalho 🎯');\n    toast('Pomodoro completo! Hora da pausa', 'success');\n    saveState();\n  } else if (pomo.mode !== 'focus' && !skipped) {\n    tryNotify('Pausa terminada', 'Pronto para o próximo foco?');\n  }\n\n  pomo.mode = pomo.mode === 'focus' ? (pomo.sessionsCompleted % 4 === 0 ? 'long' : 'break') : 'focus';\n  pomo.sessionStarted = null;\n  initPomoFromSettings();\n  document.getElementById('pomo-start-btn').textContent = 'Iniciar';\n  document.getElementById('pomo-start-btn').classList.add('primary');\n  updatePomoDisplay();\n  updatePomoMini();\n}\n\nfunction startPomodoroForTask(taskId) {\n  const t = state.tasks.find(x => x.id === taskId);\n  if (!t) return;\n  pomo.taskId = taskId;\n  pomo.mode = 'focus';\n  initPomoFromSettings();\n  openPomodoro();\n  startPomodoro();\n  toast(`Pomodoro iniciado: ${t.title.slice(0, 40)}`, 'success');\n}\n\nfunction formatPomoTime(secs) {\n  const m = Math.floor(secs / 60);\n  const s = secs % 60;\n  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;\n}\n\nfunction updatePomoDisplay() {\n  const widget = document.getElementById('pomo-widget');\n  if (!widget) return;\n  document.getElementById('pomo-time').textContent = formatPomoTime(Math.max(0, pomo.remaining));\n  document.getElementById('pomo-mode-label').textContent = pomo.mode === 'focus' ? 'FOCO' : pomo.mode === 'break' ? 'PAUSA CURTA' : 'PAUSA LONGA';\n  const taskDisplay = document.getElementById('pomo-task-display');\n  if (pomo.taskId) {\n    const t = state.tasks.find(x => x.id === pomo.taskId);\n    taskDisplay.textContent = t ? `🎯 ${t.title}` : 'Sem tarefa vinculada';\n  } else {\n    taskDisplay.textContent = 'Sem tarefa vinculada';\n  }\n  const todayPomos = state.pomodoroSessions.filter(s => s.completed && s.mode === 'focus' && s.endedAt && s.endedAt.slice(0, 10) === todayISO()).length;\n  document.getElementById('pomo-stats').textContent = `Sessões de foco hoje: ${todayPomos}`;\n}\n\nfunction updatePomoMini() {\n  const ind = document.getElementById('pomo-indicator');\n  const mini = document.getElementById('pomo-mini-display');\n  if (pomo.running) {\n    ind.style.display = 'none';\n    mini.style.display = 'inline-flex';\n    mini.textContent = formatPomoTime(Math.max(0, pomo.remaining));\n  } else {\n    ind.style.display = 'inline';\n    mini.style.display = 'none';\n  }\n}\n\n// ============================================================\n// THEME\n// ============================================================\nfunction toggleTheme() {\n  state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';\n  saveState();\n  render();\n  // Re-render charts for current view\n  if (state.currentView === 'week') renderWeekCharts();\n  else if (state.currentView === 'month') renderMonthCharts();\n  else if (state.currentView === 'metrics') renderContent();\n}\n\n// ============================================================\n// COMMAND PALETTE\n// ============================================================\nlet cmdSelectedIndex = 0;\nlet cmdItems = [];\n\nfunction openCmdPalette() {\n  document.getElementById('cmd-overlay').classList.add('open');\n  const input = document.getElementById('cmd-input');\n  input.value = '';\n  setTimeout(() => input.focus(), 50);\n  renderCmdResults();\n}\nfunction closeCmdPalette() {\n  document.getElementById('cmd-overlay').classList.remove('open');\n}\n\nfunction renderCmdResults() {\n  const q = document.getElementById('cmd-input').value.trim().toLowerCase();\n  const isCommand = q.startsWith('>');\n  const searchTerm = isCommand ? q.slice(1).trim() : q;\n  const results = document.getElementById('cmd-results');\n  cmdItems = [];\n\n  const commands = [\n    { label: 'Nova tarefa', icon: '➕', action: () => { closeCmdPalette(); openTaskModal(); }, hint: 'N' },\n    { label: 'Novo projeto', icon: '📁', action: () => { closeCmdPalette(); openProjectModal(); } },\n    { label: 'Nova meta', icon: '🚩', action: () => { closeCmdPalette(); openGoalModal(); } },\n    { label: 'Ir para Todas as tarefas', icon: '📋', action: () => { closeCmdPalette(); switchView('all'); } },\n    { label: 'Ir para Hoje', icon: '📍', action: () => { closeCmdPalette(); switchView('day'); } },\n    { label: 'Ir para Semana', icon: '📅', action: () => { closeCmdPalette(); switchView('week'); } },\n    { label: 'Ir para Mês', icon: '🗓', action: () => { closeCmdPalette(); switchView('month'); } },\n    { label: 'Ir para Matriz Eisenhower', icon: '🎯', action: () => { closeCmdPalette(); switchView('eisenhower'); } },\n    { label: 'Ir para Métricas', icon: '📊', action: () => { closeCmdPalette(); switchView('metrics'); } },\n    { label: 'Ir para Metas / OKRs', icon: '🚩', action: () => { closeCmdPalette(); switchView('goals'); } },\n    { label: 'Ir para Revisão semanal', icon: '🪞', action: () => { closeCmdPalette(); switchView('review'); } },\n    { label: 'Iniciar Pomodoro', icon: '⏱', action: () => { closeCmdPalette(); openPomodoro(); }, hint: 'F' },\n    { label: 'Abrir alertas', icon: '🔔', action: () => { closeCmdPalette(); openAlerts(); }, hint: 'A' },\n    { label: 'Alternar tema (claro / escuro)', icon: '🌓', action: () => { closeCmdPalette(); toggleTheme(); } },\n    { label: 'Abrir configurações', icon: '⚙', action: () => { closeCmdPalette(); openSettings(); } },\n    { label: 'Enviar digest p/ Slack', icon: '⚡', action: () => { closeCmdPalette(); sendSlackDigest('day'); } },\n    { label: 'Exportar backup JSON', icon: '💾', action: () => { closeCmdPalette(); exportJSON(); } },\n    { label: 'Exportar CSV de tarefas (Notion)', icon: '📊', action: () => { closeCmdPalette(); exportCSV('tasks'); } },\n    { label: 'Exportar .ics (Google Calendar)', icon: '📆', action: () => { closeCmdPalette(); exportICS(); } },\n    { label: 'Imprimir / PDF', icon: '🖨', action: () => { closeCmdPalette(); window.print(); } },\n    { label: 'Limpar concluídas > 90 dias', icon: '🧹', action: () => { closeCmdPalette(); resetCompletedOlder(); } }\n  ];\n\n  let html = '';\n  if (isCommand || !q) {\n    const filtered = commands.filter(c => !searchTerm || c.label.toLowerCase().includes(searchTerm));\n    if (filtered.length) {\n      html += '<div class=\"cmd-section\">Ações<\u002Fdiv>';\n      filtered.forEach(c => {\n        cmdItems.push(c.action);\n        html += `<div class=\"cmd-item\" onclick=\"cmdItems[${cmdItems.length - 1}](); closeCmdPalette()\" data-i=\"${cmdItems.length - 1}\">\n          <span class=\"cmd-item-icon\">${c.icon}<\u002Fspan>\n          <div class=\"cmd-item-text\">${escapeHtml(c.label)}<\u002Fdiv>\n          ${c.hint ? `<span class=\"cmd-item-kbd\">${c.hint}<\u002Fspan>` : ''}\n        <\u002Fdiv>`;\n      });\n    }\n  }\n\n  if (!isCommand && q) {\n    const tMatches = state.tasks.filter(t => t.title.toLowerCase().includes(q) || (t.notes || '').toLowerCase().includes(q) || (t.tags || []).some(tg => tg.toLowerCase().includes(q))).slice(0, 7);\n    if (tMatches.length) {\n      html += '<div class=\"cmd-section\">Tarefas<\u002Fdiv>';\n      tMatches.forEach(t => {\n        const proj = state.projects.find(p => p.id === t.project);\n        const action = () => openTaskModal(t.id);\n        cmdItems.push(action);\n        html += `<div class=\"cmd-item\" onclick=\"cmdItems[${cmdItems.length - 1}](); closeCmdPalette()\" data-i=\"${cmdItems.length - 1}\">\n          <span class=\"cmd-item-icon\">${t.status === 'done' ? '✓' : '○'}<\u002Fspan>\n          <div class=\"cmd-item-text\">${escapeHtml(t.title)}<div class=\"cmd-item-meta\">${proj ? escapeHtml(proj.name) + ' · ' : ''}${t.date ? fmtDateBR(t.date) : 'sem data'} · ${t.priority.toUpperCase()}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>`;\n      });\n    }\n    const pMatches = state.projects.filter(p => p.name.toLowerCase().includes(q) || (p.jira || '').toLowerCase().includes(q)).slice(0, 5);\n    if (pMatches.length) {\n      html += '<div class=\"cmd-section\">Projetos<\u002Fdiv>';\n      pMatches.forEach(p => {\n        const action = () => openProjectModal(p.id);\n        cmdItems.push(action);\n        html += `<div class=\"cmd-item\" onclick=\"cmdItems[${cmdItems.length - 1}](); closeCmdPalette()\" data-i=\"${cmdItems.length - 1}\">\n          <span class=\"cmd-item-icon\"><span class=\"project-dot\" style=\"background:${p.color}\"><\u002Fspan><\u002Fspan>\n          <div class=\"cmd-item-text\">${escapeHtml(p.name)}<div class=\"cmd-item-meta\">${p.jira ? p.jira + ' · ' : ''}${p.status}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>`;\n      });\n    }\n    const gMatches = state.goals.filter(g => g.title.toLowerCase().includes(q)).slice(0, 4);\n    if (gMatches.length) {\n      html += '<div class=\"cmd-section\">Metas<\u002Fdiv>';\n      gMatches.forEach(g => {\n        const action = () => openGoalModal(g.id);\n        cmdItems.push(action);\n        html += `<div class=\"cmd-item\" onclick=\"cmdItems[${cmdItems.length - 1}](); closeCmdPalette()\" data-i=\"${cmdItems.length - 1}\">\n          <span class=\"cmd-item-icon\">🚩<\u002Fspan>\n          <div class=\"cmd-item-text\">${escapeHtml(g.title)}<div class=\"cmd-item-meta\">${g.current}/${g.target} ${g.unit || ''}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>`;\n      });\n    }\n  }\n\n  if (!html) html = '<div class=\"empty-state\" style=\"padding: 24px;\">Nenhum resultado. Digite <strong>><\u002Fstrong> para ver comandos.<\u002Fdiv>';\n  results.innerHTML = html;\n  cmdSelectedIndex = 0;\n  highlightCmdSelection();\n}\n\nfunction highlightCmdSelection() {\n  document.querySelectorAll('.cmd-item').forEach((el, i) => el.classList.toggle('cmd-active', i === cmdSelectedIndex));\n  const active = document.querySelector('.cmd-item.cmd-active');\n  if (active) active.scrollIntoView({ block: 'nearest' });\n}\n\nfunction handleCmdKeydown(e) {\n  const items = document.querySelectorAll('.cmd-item');\n  if (e.key === 'Escape') { closeCmdPalette(); return; }\n  if (e.key === 'ArrowDown') { e.preventDefault(); cmdSelectedIndex = Math.min(items.length - 1, cmdSelectedIndex + 1); highlightCmdSelection(); }\n  else if (e.key === 'ArrowUp') { e.preventDefault(); cmdSelectedIndex = Math.max(0, cmdSelectedIndex - 1); highlightCmdSelection(); }\n  else if (e.key === 'Enter') {\n    e.preventDefault();\n    const idx = cmdSelectedIndex;\n    if (cmdItems[idx]) { cmdItems[idx](); closeCmdPalette(); }\n  }\n}\n\n// ============================================================\n// GLOBAL SEARCH\n// ============================================================\nfunction handleSearch() {\n  const q = document.getElementById('global-search').value.trim().toLowerCase();\n  const box = document.getElementById('search-results');\n  if (!q) { box.classList.remove('open'); return; }\n\n  const highlight = (text) => {\n    const safe = escapeHtml(text);\n    const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&') + ')', 'gi');\n    return safe.replace(re, '<mark>$1<\u002Fmark>');\n  };\n\n  let html = '';\n  const tasks = state.tasks.filter(t => t.title.toLowerCase().includes(q) || (t.notes || '').toLowerCase().includes(q)).slice(0, 6);\n  const projects = state.projects.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q)).slice(0, 3);\n\n  if (tasks.length) {\n    tasks.forEach(t => {\n      const proj = state.projects.find(p => p.id === t.project);\n      html += `<div class=\"search-result\" onclick=\"openTaskModal('${t.id}'); document.getElementById('global-search').value='';document.getElementById('search-results').classList.remove('open')\">\n        <div>${highlight(t.title)}<\u002Fdiv>\n        <div class=\"search-result-meta\">${t.status === 'done' ? '✓ ' : ''}${proj ? escapeHtml(proj.name) + ' · ' : ''}${t.date ? fmtDateBR(t.date) : 'sem data'}<\u002Fdiv>\n      <\u002Fdiv>`;\n    });\n  }\n  if (projects.length) {\n    projects.forEach(p => {\n      html += `<div class=\"search-result\" onclick=\"openProjectModal('${p.id}'); document.getElementById('global-search').value='';document.getElementById('search-results').classList.remove('open')\">\n        <div>📁 ${highlight(p.name)}<\u002Fdiv>\n        <div class=\"search-result-meta\">${p.jira ? p.jira + ' · ' : ''}${p.status}<\u002Fdiv>\n      <\u002Fdiv>`;\n    });\n  }\n  if (!html) html = '<div class=\"search-result\" style=\"cursor:default;\"><div style=\"color:var(--text-muted);\">Nada encontrado.<\u002Fdiv><\u002Fdiv>';\n\n  box.innerHTML = html;\n  box.classList.add('open');\n}\n\n// ============================================================\n// ALERTS DRAWER\n// ============================================================\nfunction openAlerts() {\n  const alerts = computeAlerts();\n  const body = document.getElementById('alerts-body');\n  if (alerts.length === 0) {\n    body.innerHTML = `<div class=\"empty-state\">${svgEmpty('clear')}<div class=\"empty-title\">Tudo limpo<\u002Fdiv><div class=\"empty-sub\">Nenhum alerta no momento. Você está em dia com prazos e bloqueios.<\u002Fdiv><\u002Fdiv>`;\n  } else {\n    body.innerHTML = alerts.map(a => `\n      <div class=\"alert-item ${a.type}\" onclick=\"${a.taskId ? `openTaskModal('${a.taskId}')` : a.projectId ? `openProjectModal('${a.projectId}')` : a.goalId ? `openGoalModal('${a.goalId}')` : ''}; closeAlerts()\">\n        <div class=\"alert-item-title\">${escapeHtml(a.title)}<\u002Fdiv>\n        <div class=\"alert-item-sub\">${escapeHtml(a.sub)}<\u002Fdiv>\n      <\u002Fdiv>\n    `).join('');\n  }\n  document.getElementById('drawer-overlay').classList.add('open');\n  document.getElementById('alerts-drawer').classList.add('open');\n}\nfunction closeAlerts() {\n  document.getElementById('drawer-overlay').classList.remove('open');\n  document.getElementById('alerts-drawer').classList.remove('open');\n}\n\n// ============================================================\n// SETTINGS\n// ============================================================\nfunction openSettings() {\n  const s = state.settings;\n  document.getElementById('set-pomo-focus').value = s.pomoFocus;\n  document.getElementById('set-pomo-break').value = s.pomoBreak;\n  document.getElementById('set-pomo-long').value = s.pomoLong;\n  document.getElementById('set-notify-overdue').checked = s.notifyOverdue;\n  document.getElementById('set-notify-duetoday').checked = s.notifyDueToday;\n  document.getElementById('set-notify-projectrisk').checked = s.notifyProjectRisk;\n  document.getElementById('set-browser-notif').checked = s.browserNotif;\n  document.getElementById('set-slack-webhook').value = s.slackWebhook || '';\n  document.getElementById('set-n8n-webhook').value = s.n8nWebhook || '';\n  document.getElementById('set-work-start').value = s.workStart;\n  document.getElementById('set-work-end').value = s.workEnd;\n  document.getElementById('set-daily-limit').value = s.dailyLimit;\n  document.getElementById('set-daily-hours').value = s.dailyHours;\n  document.getElementById('settings-modal').classList.add('open');\n}\nfunction closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }\n\nfunction saveSettings() {\n  const s = state.settings;\n  s.pomoFocus = parseInt(document.getElementById('set-pomo-focus').value) || 25;\n  s.pomoBreak = parseInt(document.getElementById('set-pomo-break').value) || 5;\n  s.pomoLong = parseInt(document.getElementById('set-pomo-long').value) || 15;\n  s.notifyOverdue = document.getElementById('set-notify-overdue').checked;\n  s.notifyDueToday = document.getElementById('set-notify-duetoday').checked;\n  s.notifyProjectRisk = document.getElementById('set-notify-projectrisk').checked;\n  s.browserNotif = document.getElementById('set-browser-notif').checked;\n  s.slackWebhook = document.getElementById('set-slack-webhook').value.trim();\n  s.n8nWebhook = document.getElementById('set-n8n-webhook').value.trim();\n  s.workStart = document.getElementById('set-work-start').value || '09:00';\n  s.workEnd = document.getElementById('set-work-end').value || '18:00';\n  s.dailyLimit = parseInt(document.getElementById('set-daily-limit').value) || 7;\n  s.dailyHours = parseFloat(document.getElementById('set-daily-hours').value) || 6;\n  if (!pomo.running) initPomoFromSettings();\n  saveState(); closeSettings(); render(); updatePomoDisplay();\n  toast('Configurações salvas', 'success');\n}\n\nfunction requestNotifPermission() {\n  if (!('Notification' in window)) { toast('Navegador não suporta notificações', 'danger'); return; }\n  Notification.requestPermission().then(p => {\n    if (p === 'granted') {\n      state.settings.browserNotif = true;\n      document.getElementById('set-browser-notif').checked = true;\n      saveState();\n      tryNotify('Notificações ativadas', 'Você receberá avisos do Reporting Hub.');\n      toast('Notificações ativadas', 'success');\n    } else {\n      toast('Permissão negada', 'danger');\n    }\n  });\n}\n\nfunction tryNotify(title, body) {\n  if (!state.settings.browserNotif) return;\n  if (!('Notification' in window) || Notification.permission !== 'granted') return;\n  try { new Notification(title, { body, icon: 'data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 32 32\"><rect width=\"32\" height=\"32\" rx=\"6\" fill=\"%23002CBE\"/><text x=\"50%\" y=\"55%\" font-family=\"Arial\" font-size=\"20\" fill=\"white\" text-anchor=\"middle\" font-weight=\"bold\" dominant-baseline=\"middle\">A<\u002Ftext><\u002Fsvg>' }); }\n  catch (e) {}\n}\n\nfunction resetCompletedOlder() {\n  const ninetyAgo = new Date(); ninetyAgo.setDate(ninetyAgo.getDate() - 90);\n  const before = state.tasks.length;\n  state.tasks = state.tasks.filter(t => !(t.status === 'done' && t.completedAt && new Date(t.completedAt) < ninetyAgo));\n  const removed = before - state.tasks.length;\n  if (removed > 0) {\n    saveState(); render();\n    toast(`${removed} tarefa(s) antiga(s) removida(s)`, 'success');\n  } else {\n    toast('Nenhuma tarefa para limpar');\n  }\n}\n\nfunction resetAllData() {\n  if (!confirm('⚠️ APAGAR todos os dados? Esta ação NÃO pode ser desfeita. Considere exportar um backup antes.')) return;\n  if (!confirm('Última confirmação: apagar projetos, tarefas, metas e histórico?')) return;\n  localStorage.removeItem(STORAGE_KEY);\n  location.reload();\n}\n\n// ============================================================\n// SLACK / N8N / EMAIL DIGESTS\n// ============================================================\nfunction buildDigest(period) {\n  const today = todayISO();\n  const todayName = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });\n  let scope, title;\n  if (period === 'day') {\n    scope = tasksForView('day');\n    title = `📍 Digest diário · ${todayName}`;\n  } else if (period === 'week') {\n    scope = tasksForView('week');\n    title = `📅 Resumo semanal · ${getWeekISO(new Date())}`;\n  } else { // review\n    const start = startOfWeek(new Date()); const end = new Date(start); end.setDate(start.getDate() + 6);\n    scope = state.tasks.filter(t => { if (!t.date) return false; const d = new Date(t.date + 'T00:00:00'); return d >= start && d <= end; });\n    title = `🪞 Review semanal · ${getWeekISO(new Date())}`;\n  }\n  const pending = scope.filter(t => t.status !== 'done');\n  const done = scope.filter(t => t.status === 'done');\n  const blocked = scope.filter(t => t.status === 'blocked');\n  const overdue = scope.filter(t => t.status !== 'done' && t.date && t.date < today);\n\n  const fmtTaskLine = t => {\n    const proj = state.projects.find(p => p.id === t.project);\n    const prio = t.priority.toUpperCase();\n    return `• [${prio}] ${t.title}${proj ? ` _(${proj.name})_` : ''}${t.date ? ` — ${fmtDateBR(t.date)}` : ''}`;\n  };\n\n  let body = `*${title}*\\n`;\n  body += `\\n📊 *Snapshot:* ${pending.length} pendente(s) · ${done.length} concluída(s) · ${blocked.length} bloqueada(s)${overdue.length > 0 ? ` · ⚠️ ${overdue.length} atrasada(s)` : ''}`;\n\n  if (overdue.length) body += `\\n\\n⚠️ *Atrasadas:*\\n` + overdue.map(fmtTaskLine).join('\\n');\n  if (blocked.length) body += `\\n\\n🚧 *Bloqueadas:*\\n` + blocked.map(fmtTaskLine).join('\\n');\n  if (pending.length) body += `\\n\\n⚡ *Pendentes:*\\n` + pending.filter(t => !overdue.includes(t) && !blocked.includes(t)).slice(0, 12).map(fmtTaskLine).join('\\n');\n  if (done.length) body += `\\n\\n✅ *Concluídas:*\\n` + done.slice(0, 12).map(fmtTaskLine).join('\\n');\n\n  if (period === 'review') {\n    const wk = getWeekISO(new Date());\n    const r = state.weeklyReviews[wk];\n    if (r) {\n      if (r.delivered) body += `\\n\\n📦 *O que entreguei:*\\n${r.delivered}`;\n      if (r.blocked) body += `\\n\\n🚧 *O que travou:*\\n${r.blocked}`;\n      if (r.wins) body += `\\n\\n🏆 *Wins:*\\n${r.wins}`;\n      if (r.lessons) body += `\\n\\n💡 *Lições:*\\n${r.lessons}`;\n      if (r.priorities) body += `\\n\\n🎯 *Próxima semana:*\\n${r.priorities}`;\n    }\n  }\n  body += `\\n\\n_Reporting Hub · Asaas_`;\n  return body;\n}\n\nasync function sendSlackDigest(period) {\n  if (!state.settings.slackWebhook) {\n    toast('Configure o webhook Slack em ⚙ Configurações', 'danger');\n    openSettings();\n    return;\n  }\n  const text = buildDigest(period);\n  toast('Enviando para o Slack...');\n  try {\n    const resp = await fetch(state.settings.slackWebhook, {\n      method: 'POST',\n      mode: 'no-cors',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({ text })\n    });\n    toast('✅ Enviado para o Slack', 'success');\n    logActivity('integration', null, 'slack-sent', period);\n  } catch (e) {\n    toast('Falha ao enviar para Slack: ' + e.message, 'danger');\n  }\n}\n\nfunction copySlackDigest(period) {\n  const text = buildDigest(period);\n  navigator.clipboard.writeText(text).then(\n    () => toast('📋 Copiado · cole no Slack', 'success'),\n    () => toast('Falha ao copiar', 'danger')\n  );\n}\n\nfunction exportEmailDigest() {\n  const text = buildDigest('day');\n  const subject = encodeURIComponent(`Digest diário · ${new Date().toLocaleDateString('pt-BR')}`);\n  const body = encodeURIComponent(text.replace(/\\*/g, '').replace(/_/g, ''));\n  window.location.href = `mailto:?subject=${subject}&body=${body}`;\n}\n\nasync function sendN8nEvent(eventType) {\n  if (!state.settings.n8nWebhook) {\n    toast('Configure o webhook n8n em ⚙ Configurações', 'danger');\n    openSettings();\n    return;\n  }\n  const payload = {\n    event: eventType,\n    timestamp: new Date().toISOString(),\n    source: 'asaas-reporting-hub',\n    summary: {\n      activeTasks: state.tasks.filter(t => t.status !== 'done').length,\n      doneToday: state.tasks.filter(t => t.status === 'done' && t.completedAt && t.completedAt.slice(0,10) === todayISO()).length,\n      overdueTasks: state.tasks.filter(t => t.status !== 'done' && t.date && t.date < todayISO()).length,\n      blockedTasks: state.tasks.filter(t => t.status === 'blocked').length,\n      atR
